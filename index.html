<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>لمّاع: حارس الابتسامة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Amiri:wght@700&family=Lalezar&display=swap');

/* Font-display: swap ensures text renders immediately with fallback, then swaps when Cairo loads */

- { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body {
width: 100%; height: 100%; overflow: hidden;
background: #1a0a2a;
font-family: ‘Cairo’, ‘Tahoma’, sans-serif;
color: #fff;
position: fixed;
}
#game-wrap {
position: fixed; inset: 0;
display: flex; align-items: center; justify-content: center;
background:
radial-gradient(ellipse at 30% 20%, #6b2d8f 0%, transparent 50%),
radial-gradient(ellipse at 70% 80%, #2d5f8f 0%, transparent 50%),
#1a0a2a;
overflow: hidden;
}
canvas {
display: block;
touch-action: none;
cursor: crosshair;
box-shadow: 0 0 60px rgba(180, 100, 255, 0.25);
border-radius: 4px;
transform-origin: center center;
}
#credits {
position: fixed;
bottom: 4px; left: 0; right: 0;
text-align: center;
font-size: 10px;
color: rgba(255,255,255,0.45);
pointer-events: none;
font-family: ‘Amiri’, serif;
letter-spacing: 0.5px;
z-index: 10;
}

</style>
</head>
<body>
<div id="game-wrap">
<canvas id="game" width="960" height="640"></canvas>
</div>
<div id="credits">✦ تطوير وإبداع: د. عبدالله آل زيد ✦ Dr. Abdullah Alzaid ✦</div>

<script>
/* =========================================================================
لمّاع: حارس الابتسامة — Lamma': Guardian of the Smile
Complete Arabic Dental Education Game
Author: Dr. Abdullah Alzaid (د. عبدالله آل زيد)
Pure Canvas + Web Audio API. Zero external dependencies.
========================================================================= */

(() => {
'use strict';

// =========================================================================
// CANVAS + ROTATION FOR PORTRAIT MOBILE
// =========================================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 960, H = 640;
let isRotated = false; // rotated 90deg for portrait mobile

function resize() {
const vw = window.innerWidth;
const vh = window.innerHeight;

// If screen is portrait (taller than wide) AND narrow, rotate the canvas 90deg
// so the game fills the screen nicely
const portraitMobile = vh > vw && vw < 700;

if (portraitMobile) {
isRotated = true;
// After rotation, game's W becomes displayed height, H becomes displayed width
const scale = Math.min(vh / W, vw / H);
const dw = W * scale;
const dh = H * scale;
canvas.style.width = dw + 'px';
canvas.style.height = dh + 'px';
canvas.style.transform = `rotate(90deg)`;
canvas.style.transformOrigin = 'center center';
} else {
isRotated = false;
const scale = Math.min(vw / W, vh / H);
canvas.style.width = (W * scale) + 'px';
canvas.style.height = (H * scale) + 'px';
canvas.style.transform = 'none';
}
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();
// Re-run resize after a beat to catch iOS's late viewport computation
setTimeout(resize, 100);
setTimeout(resize, 500);

// Paint something immediately so canvas isn't blank while everything else loads
ctx.fillStyle = '#1a0a2a';
ctx.fillRect(0, 0, W, H);
ctx.fillStyle = '#fff';
ctx.font = 'bold 48px Tahoma, Arial, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('لمّاع', W/2, H/2 - 40);
ctx.font = 'bold 24px Tahoma, Arial, sans-serif';
ctx.fillStyle = '#ffd866';
ctx.fillText('انقر للبدء', W/2, H/2 + 30);

// =========================================================================
// AUDIO ENGINE — synthesized SFX + background music
// =========================================================================
let audioCtx = null;
let muted = false;
let musicGain = null;
let musicNodes = [];
let musicPlaying = false;

function initAudio() {
if (!audioCtx) {
try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
catch(e) { audioCtx = null; }
}
if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function tone({freq=440, dur=0.15, type='sine', vol=0.2, slide=0, attack=0.01, release=0.1, delay=0}) {
if (!audioCtx || muted) return;
const start = audioCtx.currentTime + delay;
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.type = type;
osc.frequency.setValueAtTime(freq, start);
if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq + slide), start + dur);
gain.gain.setValueAtTime(0, start);
gain.gain.linearRampToValueAtTime(vol, start + attack);
gain.gain.exponentialRampToValueAtTime(0.001, start + dur + release);
osc.connect(gain).connect(audioCtx.destination);
osc.start(start);
osc.stop(start + dur + release + 0.05);
}

function noise({dur=0.2, vol=0.15, filterFreq=2000, filterType='bandpass'}) {
if (!audioCtx || muted) return;
const now = audioCtx.currentTime;
const bufferSize = audioCtx.sampleRate * dur;
const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
const data = buffer.getChannelData(0);
for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/bufferSize);
const src = audioCtx.createBufferSource();
src.buffer = buffer;
const filter = audioCtx.createBiquadFilter();
filter.type = filterType;
filter.frequency.value = filterFreq;
const gain = audioCtx.createGain();
gain.gain.setValueAtTime(vol, now);
gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
src.connect(filter).connect(gain).connect(audioCtx.destination);
src.start(now);
}

const SFX = {
brush: () => noise({dur: 0.08, vol: 0.08, filterFreq: 3500}),
pop: () => tone({freq: 600, dur: 0.08, type: 'square', vol: 0.15, slide: 200}),
good: () => { tone({freq: 523, dur: 0.1, vol: 0.2}); tone({freq: 784, dur: 0.15, vol: 0.2, delay: 0.08}); },
bad: () => { tone({freq: 220, dur: 0.15, type: 'sawtooth', vol: 0.2, slide: -100}); tone({freq: 150, dur: 0.2, type: 'sawtooth', vol: 0.2, delay: 0.12}); },
shoot: () => tone({freq: 900, dur: 0.06, type: 'triangle', vol: 0.1, slide: -500}),
hit: () => noise({dur: 0.12, vol: 0.12, filterFreq: 500}),
bossHit: () => { noise({dur: 0.2, vol: 0.18, filterFreq: 300}); tone({freq: 80, dur: 0.15, type: 'sawtooth', vol: 0.15}); },
powerup: () => { tone({freq: 440, dur: 0.1, type: 'triangle', vol: 0.2}); tone({freq: 660, dur: 0.1, vol: 0.2, delay: 0.08}); tone({freq: 880, dur: 0.2, vol: 0.2, delay: 0.16}); },
shield: () => { tone({freq: 300, dur: 0.2, type: 'sine', vol: 0.2, slide: 200}); },
win: () => { [523, 659, 784, 1047].forEach((f, i) => tone({freq: f, dur: 0.2, type: 'triangle', vol: 0.25, delay: i * 0.12})); },
lose: () => { [400, 350, 300, 250].forEach((f, i) => tone({freq: f, dur: 0.25, type: 'sawtooth', vol: 0.2, delay: i * 0.15})); },
click: () => tone({freq: 700, dur: 0.04, type: 'square', vol: 0.1}),
star: () => { tone({freq: 1200, dur: 0.1, vol: 0.15}); tone({freq: 1600, dur: 0.15, vol: 0.15, delay: 0.06}); },
levelUp: () => [523, 659, 784, 1047, 1319].forEach((f, i) => tone({freq: f, dur: 0.15, type: 'triangle', vol: 0.22, delay: i * 0.09})),
fizz: () => noise({dur: 0.4, vol: 0.1, filterFreq: 4000}),
bossRoar: () => { tone({freq: 80, dur: 0.6, type: 'sawtooth', vol: 0.3, slide: 20}); noise({dur: 0.6, vol: 0.15, filterFreq: 200}); },
catch: () => { tone({freq: 800, dur: 0.08, vol: 0.15}); tone({freq: 1000, dur: 0.1, vol: 0.15, delay: 0.05}); },
pearl: () => { tone({freq: 1500, dur: 0.06, vol: 0.12}); tone({freq: 2000, dur: 0.08, vol: 0.12, delay: 0.04}); },
victory: () => { [523, 659, 784, 659, 784, 1047, 1319].forEach((f, i) => tone({freq: f, dur: 0.18, type: 'triangle', vol: 0.25, delay: i * 0.15})); }
};

// Middle-Eastern-flavored background music loop (synthesized)
// Uses Hijaz scale feel: D, E♭, F#, G, A, B♭, C, D
function startMusic() {
if (!audioCtx || muted || musicPlaying) return;
musicPlaying = true;
musicGain = audioCtx.createGain();
musicGain.gain.value = 0.08;
musicGain.connect(audioCtx.destination);

const scale = [293.66, 311.13, 369.99, 392.00, 440.00, 466.16, 523.25]; // D, E♭, F#, G, A, B♭, C
const pattern = [0, 2, 3, 4, 3, 2, 0, 2, 4, 5, 4, 2, 0, 0, 3, 4];
const bassPattern = [0, 0, 4, 4, 3, 3, 0, 0];
const beatDur = 0.3;

let beat = 0;
function schedule() {
if (!musicPlaying) return;
const now = audioCtx.currentTime;
const idx = beat % pattern.length;
const bassIdx = Math.floor(beat / 2) % bassPattern.length;

// Melody
const osc = audioCtx.createOscillator();
const g = audioCtx.createGain();
osc.type = 'triangle';
osc.frequency.value = scale[pattern[idx]] * 2;
g.gain.setValueAtTime(0, now);
g.gain.linearRampToValueAtTime(0.15, now + 0.02);
g.gain.exponentialRampToValueAtTime(0.001, now + beatDur * 0.9);
osc.connect(g).connect(musicGain);
osc.start(now);
osc.stop(now + beatDur);

// Bass on downbeats
if (beat % 2 === 0) {
const bass = audioCtx.createOscillator();
const bg = audioCtx.createGain();
bass.type = 'sine';
bass.frequency.value = scale[bassPattern[bassIdx]] * 0.5;
bg.gain.setValueAtTime(0, now);
bg.gain.linearRampToValueAtTime(0.2, now + 0.02);
bg.gain.exponentialRampToValueAtTime(0.001, now + beatDur * 1.8);
bass.connect(bg).connect(musicGain);
bass.start(now);
bass.stop(now + beatDur * 2);
}

// Percussion: hand-drum feel every beat
const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
const nd = noiseBuf.getChannelData(0);
for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1) * Math.exp(-i / nd.length * 8);
const src = audioCtx.createBufferSource();
src.buffer = noiseBuf;
const filter = audioCtx.createBiquadFilter();
filter.type = 'lowpass';
filter.frequency.value = beat % 4 === 0 ? 200 : 800;
const pg = audioCtx.createGain();
pg.gain.value = beat % 4 === 0 ? 0.4 : 0.15;
src.connect(filter).connect(pg).connect(musicGain);
src.start(now);

beat++;
setTimeout(schedule, beatDur * 1000);
}
schedule();
}
function stopMusic() {
musicPlaying = false;
if (musicGain) {
try {
musicGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
setTimeout(() => { try { musicGain.disconnect(); } catch(e){} }, 400);
} catch(e) {}
}
}

// =========================================================================
// INPUT
// =========================================================================
const input = { x: W/2, y: H/2, down: false, clicked: false, justPressed: false, dragStart: null };
function getPos(e) {
const rect = canvas.getBoundingClientRect();
const t = e.touches ? e.touches[0] : e;
const clientX = t.clientX;
const clientY = t.clientY;

if (isRotated) {
// Canvas is rotated 90deg clockwise via CSS transform.
// rect is the axis-aligned bbox: rect.width = visual screen width (= game H after rotation),
// rect.height = visual screen height (= game W after rotation)
const localX = clientX - rect.left; // 0..rect.width
const localY = clientY - rect.top; // 0..rect.height
// For 90deg clockwise rotation:
// screen top-left -> game top-right
// screen top-right -> game bottom-right
// screen bot-left -> game top-left
// screen bot-right -> game bottom-left
// So: gameX = (1 - localY/rect.height) * W, gameY = (localX/rect.width) * H
const gameX = (1 - localY / rect.height) * W;
const gameY = (localX / rect.width) * H;
return { x: gameX, y: gameY };
}

const scaleX = canvas.width / rect.width;
const scaleY = canvas.height / rect.height;
return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}
function pointerDown(e) {
e.preventDefault();
initAudio();
const p = getPos(e);
input.x = p.x; input.y = p.y;
input.down = true; input.clicked = true; input.justPressed = true;
input.dragStart = { x: p.x, y: p.y };
}
function pointerMove(e) { e.preventDefault(); const p = getPos(e); input.x = p.x; input.y = p.y; }
function pointerUp(e) { e.preventDefault(); input.down = false; input.dragStart = null; }
canvas.addEventListener('mousedown', pointerDown);
canvas.addEventListener('mousemove', pointerMove);
canvas.addEventListener('mouseup', pointerUp);
canvas.addEventListener('touchstart', pointerDown, {passive: false});
canvas.addEventListener('touchmove', pointerMove, {passive: false});
canvas.addEventListener('touchend', pointerUp, {passive: false});

// =========================================================================
// STATE
// =========================================================================
const state = {
scene: 'title',
score: 0,
totalScore: 0,
level: 1,
stars: [0, 0, 0],
pearlPoints: 0,
capeColor: '#3a6fc4',
particles: [],
floatTexts: [],
t: 0,
unlockedCertificate: false
};

// Cape color options (unlockable at Pearl thresholds)
const CAPE_COLORS = [
{ color: '#3a6fc4', cost: 0, name: 'أزرق' },
{ color: '#c43a6f', cost: 30, name: 'وردي' },
{ color: '#3ac46f', cost: 60, name: 'أخضر' },
{ color: '#c49a3a', cost: 100, name: 'ذهبي' },
{ color: '#8f3ac4', cost: 150, name: 'بنفسجي' },
{ color: '#c4363a', cost: 200, name: 'أحمر' }
];

try {
const saved = JSON.parse(localStorage.getItem('lamma_v2') || '{}');
if (saved.stars) state.stars = saved.stars;
if (saved.totalScore) state.totalScore = saved.totalScore;
if (saved.pearlPoints) state.pearlPoints = saved.pearlPoints;
if (saved.capeColor) state.capeColor = saved.capeColor;
if (saved.unlockedCertificate) state.unlockedCertificate = saved.unlockedCertificate;
} catch(e) {}

function save() {
try {
localStorage.setItem('lamma_v2', JSON.stringify({
stars: state.stars,
totalScore: state.totalScore,
pearlPoints: state.pearlPoints,
capeColor: state.capeColor,
unlockedCertificate: state.unlockedCertificate
}));
} catch(e) {}
}

// =========================================================================
// PARTICLES
// =========================================================================
function addParticle(x, y, color, count = 8, speed = 1) {
for (let i = 0; i < count; i++) {
state.particles.push({
x, y,
vx: (Math.random() - 0.5) * 6 * speed,
vy: (Math.random() - 0.5) * 6 * speed - 2,
life: 1, color, size: Math.random() * 4 + 2
});
}
}
function addPearl(x, y) {
state.particles.push({
x, y, vx: 0, vy: -2.5, life: 2, color: '#ffecb0', size: 8, pearl: true
});
}
function addFloat(x, y, text, color = '#fff', size = 24) {
state.floatTexts.push({ x, y, text, color, life: 1.2, size });
}
function updateParticles(dt) {
for (let i = state.particles.length - 1; i >= 0; i--) {
const p = state.particles[i];
p.x += p.vx; p.y += p.vy;
if (!p.pearl) p.vy += 0.2;
p.life -= dt * (p.pearl ? 0.7 : 1.5);
if (p.life <= 0) state.particles.splice(i, 1);
}
for (let i = state.floatTexts.length - 1; i >= 0; i--) {
const f = state.floatTexts[i];
f.y -= 1.2; f.life -= dt * 0.7;
if (f.life <= 0) state.floatTexts.splice(i, 1);
}
}
function drawParticles() {
for (const p of state.particles) {
ctx.globalAlpha = Math.min(1, p.life);
if (p.pearl) {
const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 1.5);
g.addColorStop(0, '#fff8c8');
g.addColorStop(1, 'rgba(255,200,100,0)');
ctx.fillStyle = g;
ctx.beginPath();
ctx.arc(p.x, p.y, p.size * 1.8, 0, Math.PI * 2);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.beginPath();
ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
ctx.fill();
} else {
ctx.fillStyle = p.color;
ctx.beginPath();
ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
ctx.fill();
}
}
ctx.globalAlpha = 1;
for (const f of state.floatTexts) {
ctx.globalAlpha = Math.min(1, f.life);
ctx.fillStyle = f.color;
ctx.font = `bold ${f.size}px Cairo, sans-serif`;
ctx.textAlign = 'center';
ctx.strokeStyle = 'rgba(0,0,0,0.6)';
ctx.lineWidth = 4;
ctx.strokeText(f.text, f.x, f.y);
ctx.fillText(f.text, f.x, f.y);
}
ctx.globalAlpha = 1;
}

// =========================================================================
// لمّاع — hero tooth with cape, belt, expressions
// =========================================================================
function drawLammaa(x, y, size = 60, mood = 'happy', wiggle = 0, opts = {}) {
ctx.save();
ctx.translate(x, y);
ctx.rotate(Math.sin(wiggle) * 0.05);

// Glow halo
const halo = ctx.createRadialGradient(0, 0, size*0.3, 0, 0, size*1.8);
halo.addColorStop(0, 'rgba(180,230,255,0.35)');
halo.addColorStop(1, 'rgba(180,230,255,0)');
ctx.fillStyle = halo;
ctx.fillRect(-size*1.8, -size*1.8, size*3.6, size*3.6);

// CAPE (behind body)
if (opts.cape !== false) {
const capeWave = Math.sin(wiggle * 2 + 1) * 0.15;
ctx.save();
ctx.translate(0, -size * 0.3);
ctx.rotate(capeWave);
const capeGrad = ctx.createLinearGradient(0, -size*0.3, 0, size*1.2);
capeGrad.addColorStop(0, state.capeColor);
capeGrad.addColorStop(1, shade(state.capeColor, -30));
ctx.fillStyle = capeGrad;
ctx.strokeStyle = shade(state.capeColor, -50);
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(-size*0.75, -size*0.3);
ctx.quadraticCurveTo(-size*1.2, size*0.3, -size*0.9, size*1.1);
ctx.quadraticCurveTo(-size*0.4, size*0.95, 0, size*1.15);
ctx.quadraticCurveTo(size*0.4, size*0.95, size*0.9, size*1.1);
ctx.quadraticCurveTo(size*1.2, size*0.3, size*0.75, -size*0.3);
ctx.closePath();
ctx.fill();
ctx.stroke();

// Arabic-calligraphy-style pattern on cape
ctx.strokeStyle = 'rgba(255,255,255,0.35)';
ctx.lineWidth = 2;
for (let i = 0; i < 3; i++) {
const cy = size*(0.1 + i*0.3);
ctx.beginPath();
ctx.moveTo(-size*0.6, cy);
ctx.bezierCurveTo(-size*0.3, cy - 8, size*0.3, cy + 8, size*0.6, cy);
ctx.stroke();
}
// Tiny star in center
ctx.fillStyle = '#ffdd66';
drawStar(0, size*0.5, size*0.1, true, false);
ctx.restore();
}

// Tooth body
ctx.fillStyle = '#ffffff';
ctx.strokeStyle = '#88b5d1';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(-size*0.7, -size*0.4);
ctx.quadraticCurveTo(-size*0.82, -size*0.95, -size*0.3, -size*0.98);
ctx.quadraticCurveTo(0, -size*1.02, size*0.3, -size*0.98);
ctx.quadraticCurveTo(size*0.82, -size*0.95, size*0.7, -size*0.4);
ctx.quadraticCurveTo(size*0.62, size*0.3, size*0.5, size*0.88);
ctx.quadraticCurveTo(size*0.3, size*0.98, size*0.15, size*0.72);
ctx.quadraticCurveTo(0, size*0.52, -size*0.15, size*0.72);
ctx.quadraticCurveTo(-size*0.3, size*0.98, -size*0.5, size*0.88);
ctx.quadraticCurveTo(-size*0.62, size*0.3, -size*0.7, -size*0.4);
ctx.closePath();
ctx.fill();
ctx.stroke();

// Pearlescent highlight
const shine = ctx.createLinearGradient(-size*0.5, -size*0.8, -size*0.2, -size*0.2);
shine.addColorStop(0, 'rgba(255,255,255,0.95)');
shine.addColorStop(1, 'rgba(255,255,255,0)');
ctx.fillStyle = shine;
ctx.beginPath();
ctx.ellipse(-size*0.3, -size*0.5, size*0.18, size*0.35, -0.3, 0, Math.PI*2);
ctx.fill();

// BELT (toothpaste squeeze) — horizontal band with tube
ctx.save();
const beltY = size * 0.2;
// Belt base
ctx.fillStyle = '#2a4f7a';
ctx.strokeStyle = '#1a3558';
ctx.lineWidth = 1.5;
roundRect(-size*0.7, beltY - size*0.08, size*1.4, size*0.16, 4);
ctx.fill();
ctx.stroke();
// Buckle: toothpaste tube icon
ctx.fillStyle = '#ffcc44';
roundRect(-size*0.12, beltY - size*0.1, size*0.24, size*0.2, 3);
ctx.fill();
ctx.strokeStyle = '#c4961a';
ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = `bold ${Math.floor(size*0.15)}px Cairo`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('T', 0, beltY);
ctx.restore();

// Eyes
ctx.fillStyle = '#1a2a4a';
const eyeY = -size*0.25;
const eyeSize = size*0.12;
if (mood === 'happy' || mood === 'wink' || mood === 'excited') {
ctx.beginPath();
ctx.arc(-size*0.25, eyeY, eyeSize, 0, Math.PI*2);
ctx.fill();
if (mood === 'wink') {
ctx.strokeStyle = '#1a2a4a';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(size*0.15, eyeY);
ctx.lineTo(size*0.35, eyeY);
ctx.stroke();
} else {
ctx.beginPath();
ctx.arc(size*0.25, eyeY, eyeSize, 0, Math.PI*2);
ctx.fill();
}
// Shine
ctx.fillStyle = '#fff';
ctx.beginPath();
ctx.arc(-size*0.22, eyeY - eyeSize*0.35, eyeSize*0.35, 0, Math.PI*2);
if (mood !== 'wink') ctx.arc(size*0.28, eyeY - eyeSize*0.35, eyeSize*0.35, 0, Math.PI*2);
ctx.fill();
if (mood === 'excited') {
// Star eyes
ctx.fillStyle = '#ffdd66';
drawStar(-size*0.25, eyeY, eyeSize*0.5, true, false);
drawStar(size*0.25, eyeY, eyeSize*0.5, true, false);
}
} else if (mood === 'hurt') {
ctx.strokeStyle = '#1a2a4a';
ctx.lineWidth = 3;
ctx.lineCap = 'round';
[-1, 1].forEach(dir => {
const ex = dir * size*0.25;
ctx.beginPath();
ctx.moveTo(ex - eyeSize*0.7, eyeY - eyeSize*0.5);
ctx.lineTo(ex + eyeSize*0.7, eyeY + eyeSize*0.5);
ctx.moveTo(ex - eyeSize*0.7, eyeY + eyeSize*0.5);
ctx.lineTo(ex + eyeSize*0.7, eyeY - eyeSize*0.5);
ctx.stroke();
});
} else if (mood === 'sad') {
ctx.strokeStyle = '#1a2a4a';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.arc(-size*0.25, eyeY + eyeSize, eyeSize, Math.PI, Math.PI*2);
ctx.arc(size*0.25, eyeY + eyeSize, eyeSize, Math.PI, Math.PI*2);
ctx.stroke();
}

// Mouth
ctx.strokeStyle = '#1a2a4a';
ctx.lineWidth = 3;
ctx.lineCap = 'round';
ctx.beginPath();
if (mood === 'happy' || mood === 'wink') {
ctx.arc(0, -size*0.02, size*0.22, 0.15 * Math.PI, 0.85 * Math.PI);
} else if (mood === 'excited') {
ctx.arc(0, 0, size*0.2, 0, Math.PI);
ctx.fillStyle = '#ff6b8a';
ctx.fill();
ctx.fillStyle = '#fff';
ctx.beginPath();
ctx.arc(0, -size*0.02, size*0.22, 0.15*Math.PI, 0.85*Math.PI);
ctx.stroke();
} else if (mood === 'sad' || mood === 'hurt') {
ctx.arc(0, size*0.28, size*0.22, 1.15 * Math.PI, 1.85 * Math.PI);
}
ctx.stroke();

// Sparkles orbit
if (mood === 'happy' || mood === 'excited') {
ctx.fillStyle = '#ffdd66';
for (let i = 0; i < 3; i++) {
const a = wiggle + (i * Math.PI * 2 / 3);
const sx = Math.cos(a) * size * 1.05;
const sy = Math.sin(a) * size * 0.95 - size * 0.7;
drawStar(sx, sy, size*0.08, true, false);
}
}

ctx.restore();
}

// =========================================================================
// DRAWING HELPERS
// =========================================================================
function roundRect(x, y, w, h, r) {
ctx.beginPath();
ctx.moveTo(x+r, y);
ctx.arcTo(x+w, y, x+w, y+h, r);
ctx.arcTo(x+w, y+h, x, y+h, r);
ctx.arcTo(x, y+h, x, y, r);
ctx.arcTo(x, y, x+w, y, r);
ctx.closePath();
}
function shade(hex, amt) {
const c = parseInt(hex.slice(1), 16);
const r = Math.max(0, Math.min(255, (c >> 16) + amt));
const g = Math.max(0, Math.min(255, ((c >> 8) & 0xff) + amt));
const b = Math.max(0, Math.min(255, (c & 0xff) + amt));
return `rgb(${r},${g},${b})`;
}

function drawButton(x, y, w, h, text, color1 = '#4da6d9', color2 = '#2d7ab0', font = 'bold 24px Cairo') {
const hover = input.x >= x && input.x <= x+w && input.y >= y && input.y <= y+h;
const grad = ctx.createLinearGradient(x, y, x, y+h);
grad.addColorStop(0, hover ? shade(color1, 30) : color1);
grad.addColorStop(1, hover ? shade(color2, 30) : color2);
ctx.fillStyle = grad;
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
roundRect(x, y, w, h, 14);
ctx.fill();
ctx.stroke();
ctx.save();
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 6;
ctx.shadowOffsetY = 2;
ctx.fillStyle = '#fff';
ctx.font = font;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(text, x + w/2, y + h/2);
ctx.restore();
return hover && input.clicked;
}

function drawStar(x, y, size, filled, stroked = true) {
ctx.save();
ctx.translate(x, y);
ctx.beginPath();
for (let i = 0; i < 10; i++) {
const r = i % 2 === 0 ? size : size * 0.45;
const a = (i / 10) * Math.PI * 2 - Math.PI/2;
const px = Math.cos(a) * r;
const py = Math.sin(a) * r;
if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
}
ctx.closePath();
if (filled) {
const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
grad.addColorStop(0, '#fff5a0');
grad.addColorStop(1, '#ffc83d');
ctx.fillStyle = grad;
ctx.fill();
if (stroked) { ctx.strokeStyle = '#b88700'; ctx.lineWidth = 2; ctx.stroke(); }
} else {
ctx.fillStyle = 'rgba(60,60,90,0.5)';
ctx.fill();
ctx.strokeStyle = 'rgba(255,255,255,0.3)';
ctx.lineWidth = 2;
ctx.stroke();
}
ctx.restore();
}

// =========================================================================
// BACKGROUND
// =========================================================================
const bgStars = [];
for (let i = 0; i < 80; i++) {
bgStars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.8 + 0.4, phase: Math.random() * Math.PI * 2 });
}
function drawBackground(theme = 'night') {
let grad;
if (theme === 'night') {
grad = ctx.createLinearGradient(0, 0, 0, H);
grad.addColorStop(0, '#2e1f5c');
grad.addColorStop(0.5, '#1f2f6e');
grad.addColorStop(1, '#0f1838');
} else if (theme === 'kitchen') {
grad = ctx.createLinearGradient(0, 0, 0, H);
grad.addColorStop(0, '#4a6fa5');
grad.addColorStop(0.6, '#2a3f68');
grad.addColorStop(1, '#1a2545');
} else if (theme === 'mouth') {
grad = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, W);
grad.addColorStop(0, '#ff9aaf');
grad.addColorStop(0.6, '#c45670');
grad.addColorStop(1, '#6e2a3a');
} else if (theme === 'fortress') {
grad = ctx.createRadialGradient(W/2, H/2, 100, W/2, H/2, W);
grad.addColorStop(0, '#2a4a7e');
grad.addColorStop(0.5, '#1a2a58');
grad.addColorStop(1, '#060a1e');
}
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);
for (const s of bgStars) {
const twinkle = 0.5 + 0.5 * Math.sin(state.t * 0.002 + s.phase);
ctx.fillStyle = `rgba(220,230,255,${twinkle * 0.6})`;
ctx.beginPath();
ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
ctx.fill();
}
}

// =========================================================================
// DR. DECAY character (the villain)
// =========================================================================
function drawDrDecay(x, y, size = 100, mood = 'evil', wiggle = 0) {
ctx.save();
ctx.translate(x, y);
ctx.rotate(Math.sin(wiggle) * 0.03);

// Dark aura
const aura = ctx.createRadialGradient(0, 0, size*0.3, 0, 0, size*2);
aura.addColorStop(0, 'rgba(120,20,60,0.4)');
aura.addColorStop(1, 'rgba(40,0,20,0)');
ctx.fillStyle = aura;
ctx.fillRect(-size*2, -size*2, size*4, size*4);

// Cloak
ctx.fillStyle = '#1a0a1e';
ctx.strokeStyle = '#4a0a2e';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(-size*0.8, -size*0.2);
ctx.quadraticCurveTo(-size*1.1, size*0.5, -size*0.9, size*1.3);
ctx.lineTo(size*0.9, size*1.3);
ctx.quadraticCurveTo(size*1.1, size*0.5, size*0.8, -size*0.2);
ctx.closePath();
ctx.fill();
ctx.stroke();

// Cloak pattern (skulls hint)
ctx.fillStyle = 'rgba(180,60,90,0.3)';
for (let i = 0; i < 4; i++) {
for (let j = 0; j < 3; j++) {
const px = -size*0.6 + i * size*0.4;
const py = size*0.1 + j * size*0.35;
ctx.beginPath();
ctx.arc(px, py, size*0.05, 0, Math.PI*2);
ctx.fill();
}
}

// Rotten tooth body (decay villain is a decayed tooth!)
const bodyGrad = ctx.createLinearGradient(0, -size*0.8, 0, size*0.2);
bodyGrad.addColorStop(0, '#6a5030');
bodyGrad.addColorStop(1, '#3a2818');
ctx.fillStyle = bodyGrad;
ctx.strokeStyle = '#1a0e05';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(-size*0.55, -size*0.3);
ctx.quadraticCurveTo(-size*0.7, -size*0.8, -size*0.2, -size*0.85);
ctx.quadraticCurveTo(0, -size*0.9, size*0.2, -size*0.85);
ctx.quadraticCurveTo(size*0.7, -size*0.8, size*0.55, -size*0.3);
ctx.lineTo(size*0.55, size*0.2);
ctx.lineTo(-size*0.55, size*0.2);
ctx.closePath();
ctx.fill();
ctx.stroke();

// Cavity holes
ctx.fillStyle = '#0a0000';
ctx.beginPath();
ctx.arc(-size*0.25, -size*0.45, size*0.08, 0, Math.PI*2);
ctx.arc(size*0.2, -size*0.3, size*0.1, 0, Math.PI*2);
ctx.fill();

// Evil eyes
ctx.fillStyle = '#ff2030';
ctx.beginPath();
ctx.arc(-size*0.2, -size*0.55, size*0.08, 0, Math.PI*2);
ctx.arc(size*0.2, -size*0.55, size*0.08, 0, Math.PI*2);
ctx.fill();
// Eye glow
ctx.fillStyle = 'rgba(255,50,80,0.5)';
ctx.beginPath();
ctx.arc(-size*0.2, -size*0.55, size*0.14, 0, Math.PI*2);
ctx.arc(size*0.2, -size*0.55, size*0.14, 0, Math.PI*2);
ctx.fill();

// Evil smile with sharp teeth
ctx.strokeStyle = '#0a0000';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(-size*0.25, -size*0.2);
ctx.lineTo(-size*0.15, -size*0.1);
ctx.lineTo(-size*0.05, -size*0.2);
ctx.lineTo(size*0.05, -size*0.1);
ctx.lineTo(size*0.15, -size*0.2);
ctx.lineTo(size*0.25, -size*0.1);
ctx.stroke();

// Drill hand (right side, wiggles)
ctx.save();
ctx.translate(size*0.7, size*0.1);
ctx.rotate(wiggle * 3);
ctx.fillStyle = '#888';
ctx.strokeStyle = '#333';
ctx.lineWidth = 2;
roundRect(-size*0.08, 0, size*0.16, size*0.5, 4);
ctx.fill(); ctx.stroke();
// Drill bit
ctx.fillStyle = '#bbb';
ctx.beginPath();
ctx.moveTo(-size*0.1, size*0.5);
ctx.lineTo(size*0.1, size*0.5);
ctx.lineTo(0, size*0.85);
ctx.closePath();
ctx.fill();
ctx.stroke();
// Drill spirals
ctx.strokeStyle = '#222';
for (let i = 0; i < 4; i++) {
ctx.beginPath();
ctx.moveTo(-size*0.08, size*0.55 + i*0.06*size);
ctx.lineTo(size*0.08 * (1 - i*0.2), size*0.58 + i*0.06*size);
ctx.stroke();
}
ctx.restore();

ctx.restore();
}

y: 180 + Math.random() * 250,
life: 10,
wobble: 0
});
},
update(dt) {
if (this.done) return;
this.wiggle += dt * 2;
this.timeLeft -= dt;
if (this.shieldTime > 0) this.shieldTime -= dt;

if (this.phase === 'teeth') {
this.updateTeeth(dt);
// Enter dragon fight when 80% cleaned
if (this.scored / this.totalPlaques >= 0.8 && !this.dragon) {
this.phase = 'dragon';
this.dragon = {
x: W/2,
y: -100,
targetY: 280,
size: 130,
hp: 10,
maxHp: 10,
wobble: 0,
hurt: 0
};
SFX.bossRoar();
addFloat(W/2, H/2 - 100, 'تنّين البلاك ظهر!', '#ffdd66', 36);
}
} else if (this.phase === 'dragon') {
this.updateDragon(dt);
}
},
updateTeeth(dt) {
// Germ movement
for (const g of this.germs) {
if (!g.alive) continue;
g.x += g.vx * dt; g.y += g.vy * dt;
g.wobble += dt * 4;
if (g.x < 50 || g.x > W - 50) g.vx *= -1;
if (g.y < 150 || g.y > 500) g.vy *= -1;
}

// Powerups drift
for (let i = this.powerups.length - 1; i >= 0; i--) {
const p = this.powerups[i];
p.life -= dt;
p.wobble += dt * 3;
if (p.life <= 0) this.powerups.splice(i, 1);
}
// Spawn new powerup occasionally
if (this.powerups.length === 0 && Math.random() < 0.01) this.spawnPowerup();

// Brush trail
if (input.down) {
this.brushTrail.push({ x: input.x, y: input.y, life: 1 });
if (Math.random() < 0.3) SFX.brush();
}
for (let i = this.brushTrail.length - 1; i >= 0; i--) {
this.brushTrail[i].life -= dt * 3;
if (this.brushTrail[i].life <= 0) this.brushTrail.splice(i, 1);
}

const brushRadius = this.shieldTime > 0 ? 60 : 30;

// Plaques
if (input.down || this.shieldTime > 0) {
for (const p of this.plaques) {
if (!p.alive) continue;
const dx = p.x - input.x, dy = p.y - input.y;
const d = Math.sqrt(dx*dx + dy*dy);
if (d < brushRadius) {
p.health -= dt * (this.shieldTime > 0 ? 8 : 4);
if (p.health <= 0) {
p.alive = false;
this.scored++;
state.score += 100;
addParticle(p.x, p.y, '#8fd9b8', 12);
addParticle(p.x, p.y, '#fff', 6);
addFloat(p.x, p.y - 20, '+100', '#aaffcc');
if (Math.random() < 0.3) { addPearl(p.x, p.y); state.pearlPoints++; save(); }
SFX.pop();
}
}
}
// Germs
for (const g of this.germs) {
if (!g.alive) continue;
const dx = g.x - input.x, dy = g.y - input.y;
const d = Math.sqrt(dx*dx + dy*dy);
if (d < brushRadius + 10) {
g.hp -= dt * (this.shieldTime > 0 ? 8 : 3);
if (g.hp <= 0) {
g.alive = false;
state.score += 150;
addParticle(g.x, g.y, '#88ff88', 14);
addFloat(g.x, g.y - 20, '+150', '#aaffaa');
if (Math.random() < 0.5) { addPearl(g.x, g.y); state.pearlPoints++; save(); }
SFX.pop();
}
}
}
}

// Collect powerup
for (let i = this.powerups.length - 1; i >= 0; i--) {
const p = this.powerups[i];
const dx = p.x - input.x, dy = p.y - input.y;
if (dx*dx + dy*dy < 900) {
this.powerups.splice(i, 1);
this.shieldTime = 10;
addParticle(p.x, p.y, '#88ccff', 20, 1.5);
addFloat(p.x, p.y, 'درع الفلورايد!', '#88ddff', 28);
SFX.shield();
}
}

// Check time out
if (this.timeLeft <= 0 && !this.dragon) {
this.done = true;
setTimeout(() => this.showResult(), 600);
}
},
updateDragon(dt) {
this.dragonTime += dt;
const d = this.dragon;
if (d.y < d.targetY) d.y += dt * 80;
d.wobble += dt * 2;
if (d.hurt > 0) d.hurt -= dt * 2;

// Track circular motion: if brush makes circles, damage dragon
if (input.down) {
this.brushStrokes.push({ x: input.x, y: input.y, t: state.t });
if (this.brushStrokes.length > 40) this.brushStrokes.shift();

// Also draw trail
this.brushTrail.push({ x: input.x, y: input.y, life: 1 });
if (Math.random() < 0.3) SFX.brush();

// Detect circular motion around dragon
const centerX = d.x, centerY = d.y;
const dx = input.x - centerX, dy = input.y - centerY;
const dist = Math.sqrt(dx*dx + dy*dy);
if (dist < d.size + 50 && dist > d.size - 30) {
// We're on the dragon's surface. Check if motion is circular
if (this.brushStrokes.length >= 8) {
const recent = this.brushStrokes.slice(-8);
let totalAngleChange = 0;
for (let i = 1; i < recent.length; i++) {
const a1 = Math.atan2(recent[i-1].y - centerY, recent[i-1].x - centerX);
const a2 = Math.atan2(recent[i].y - centerY, recent[i].x - centerX);
let diff = a2 - a1;
if (diff > Math.PI) diff -= Math.PI * 2;
if (diff < -Math.PI) diff += Math.PI * 2;
totalAngleChange += diff;
}
if (Math.abs(totalAngleChange) > 0.6) {
d.hp -= dt * 3;
d.hurt = 0.3;
state.score += Math.floor(dt * 300);
if (Math.random() < 0.1) {
addParticle(input.x, input.y, '#ffcc44', 5);
addPearl(input.x, input.y);
state.pearlPoints++;
save();
}
if (d.hp <= 0) {
this.done = true;
addParticle(d.x, d.y, '#ffdd66', 40, 2);
addParticle(d.x, d.y, '#ff8844', 30, 2);
for (let k = 0; k < 8; k++) { addPearl(d.x + (Math.random()-0.5)*100, d.y + (Math.random()-0.5)*100); state.pearlPoints++; }
save();
SFX.victory();
setTimeout(() => this.showResult(), 1200);
}
}
}
}
}

for (let i = this.brushTrail.length - 1; i >= 0; i--) {
this.brushTrail[i].life -= dt * 3;
if (this.brushTrail[i].life <= 0) this.brushTrail.splice(i, 1);
}

// Dragon attacks: timeout
if (this.timeLeft <= 0) {
this.done = true;
setTimeout(() => this.showResult(), 600);
}
},
showResult() {
let stars = 0;
const pct = this.scored / this.totalPlaques;
if (pct >= 0.5) stars = 1;
if (pct >= 0.8 && this.dragon) stars = 2;
if (this.dragon && this.dragon.hp <= 0) stars = 3;
state.stars[0] = Math.max(state.stars[0], stars);
state.totalScore += state.score;
save();
if (stars > 0) SFX.win(); else SFX.lose();
state.scene = 'result';
resultScene.init(stars, state.score, 'معركة التنظيف');
},
draw() {
drawBackground('mouth');
// Pink mouth walls
ctx.fillStyle = 'rgba(255, 180, 200, 0.2)';
ctx.beginPath();
ctx.arc(W/2, H/2, 350, 0, Math.PI * 2);
ctx.fill();

// HUD
this.drawHUD();

if (this.phase === 'teeth') {
// Instruction
ctx.fillStyle = 'rgba(255,255,255,0.95)';
ctx.font = 'bold 22px Cairo';
ctx.textAlign = 'center';
ctx.shadowColor = 'rgba(0,0,0,0.6)';
ctx.shadowBlur = 4;
ctx.fillText('اسحب الفرشاة لتنظيف الأسنان وعصابة الجراثيم!', W/2, 130);
ctx.shadowBlur = 0;

// Draw teeth rows
const zones = [
{ cx: W/2, cy: 250, count: 8, range: 240 },
{ cx: W/2 - 230, cy: 400, count: 3, range: 150 },
{ cx: W/2 + 230, cy: 400, count: 3, range: 150 }
];
// Top row
for (let i = 0; i < 6; i++) {
drawLammaa(W/2 - 200 + i * 80, 250, 34, 'happy', this.wiggle + i, {cape: false});
}
// Bottom rows
for (let i = 0; i < 3; i++) {
drawLammaa(W/2 - 300 + i * 60, 420, 30, 'happy', this.wiggle + i, {cape: false});
drawLammaa(W/2 + 180 + i * 60, 420, 30, 'happy', this.wiggle + i, {cape: false});
}

// Plaques
for (const p of this.plaques) {

p.wobble += 0.05;
this.drawPlaque(p);
}

// Germs
for (const g of this.germs) {
if (!g.alive) continue;
this.drawGerm(g);
}

// Powerups
for (const p of this.powerups) {
this.drawPowerup(p);
}
} else if (this.phase === 'dragon') {
ctx.fillStyle = 'rgba(255,255,255,0.95)';
ctx.font = 'bold 22px Cairo';
ctx.textAlign = 'center';
ctx.shadowColor = 'rgba(0,0,0,0.6)';
ctx.shadowBlur = 4;
ctx.fillText('حرّك الفرشاة بحركات دائرية لإذابة التنّين!', W/2, 130);

this.drawDragon();
}

// Brush trail
for (const t of this.brushTrail) {
const r = this.shieldTime > 0 ? 50 : 25;

? `rgba(120,220,255,${t.life * 0.5})`
: `rgba(180,230,255,${t.life * 0.4})`;

}

this.drawBrush();
drawParticles();

if (drawButton(W/2 - 70, H - 50, 140, 40, 'خروج', '#a04545', '#702525', 'bold 18px Cairo')) {
SFX.click();
state.scene = 'menu';
}
},
drawHUD() {
// Score
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(20, 20, 180, 50, 10);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'right';
ctx.textBaseline = 'middle';
ctx.fillText(`النقاط: ${state.score}`, 185, 45);

// Timer (toothbrush-shaped progress!)

ctx.fill();
// Toothbrush handle
const fillPct = Math.max(0, this.timeLeft / 120);
const fillColor = this.timeLeft < 20 ? '#ff4d4d' : '#5cd8e8';
ctx.fillStyle = fillColor;
roundRect(timerX + 4 + (220 - 4) * (1 - fillPct), timerY + 4, (220 - 8) * fillPct, 32, 6);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 16px Cairo';
ctx.textAlign = 'center';
ctx.fillText(`${Math.max(0, Math.ceil(this.timeLeft))} ثانية`, timerX + 110, timerY + 22);

// Shield indicator
if (this.shieldTime > 0) {
ctx.fillStyle = 'rgba(100,200,255,0.3)';
roundRect(W/2 - 80, 85, 160, 30, 8);
ctx.fill();
ctx.strokeStyle = '#88ddff';
ctx.lineWidth = 2;
ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = 'bold 16px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(`🛡️ درع الفلورايد ${this.shieldTime.toFixed(1)}s`, W/2, 100);
}
},
drawPlaque(p) {
const sz = 16 + Math.sin(p.wobble) * 2;
ctx.fillStyle = 'rgba(0,0,0,0.3)';
ctx.beginPath();
ctx.ellipse(p.x, p.y + sz*0.8, sz*0.7, sz*0.3, 0, 0, Math.PI*2);
ctx.fill();
const grad = ctx.createRadialGradient(p.x - sz*0.3, p.y - sz*0.3, 0, p.x, p.y, sz);
grad.addColorStop(0, '#d4c070');
grad.addColorStop(1, '#7a6030');
ctx.fillStyle = grad;
ctx.beginPath();
ctx.arc(p.x, p.y, sz, 0, Math.PI*2);
ctx.fill();
// Face
ctx.fillStyle = '#2a1a00';
ctx.beginPath();
ctx.arc(p.x - sz*0.3, p.y - sz*0.2, 2, 0, Math.PI*2);
ctx.arc(p.x + sz*0.3, p.y - sz*0.2, 2, 0, Math.PI*2);
ctx.fill();
},
drawGerm(g) {
const sz = g.size + Math.sin(g.wobble) * 3;
// Body — green blob
ctx.fillStyle = 'rgba(0,0,0,0.3)';
ctx.beginPath();
ctx.ellipse(g.x, g.y + sz*0.9, sz*0.8, sz*0.3, 0, 0, Math.PI*2);
ctx.fill();
const grad = ctx.createRadialGradient(g.x - sz*0.3, g.y - sz*0.3, 0, g.x, g.y, sz);
grad.addColorStop(0, '#8ede60');
grad.addColorStop(1, '#3a8020');
ctx.fillStyle = grad;
ctx.strokeStyle = '#1a5010';
ctx.lineWidth = 2;
ctx.beginPath();
for (let a = 0; a < Math.PI*2; a += Math.PI/8) {
const r = sz + Math.sin(a * 4 + g.wobble) * 3;
const px = g.x + Math.cos(a) * r;
const py = g.y + Math.sin(a) * r;
if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
}
ctx.closePath();
ctx.fill();
ctx.stroke();
// Silly eyes
ctx.fillStyle = '#fff';
ctx.beginPath();
ctx.arc(g.x - sz*0.3, g.y - sz*0.1, sz*0.25, 0, Math.PI*2);
ctx.arc(g.x + sz*0.3, g.y - sz*0.1, sz*0.25, 0, Math.PI*2);
ctx.fill();
ctx.fillStyle = '#000';
ctx.beginPath();
ctx.arc(g.x - sz*0.3 + Math.sin(g.wobble)*2, g.y - sz*0.1, sz*0.1, 0, Math.PI*2);
ctx.arc(g.x + sz*0.3 + Math.sin(g.wobble)*2, g.y - sz*0.1, sz*0.1, 0, Math.PI*2);
ctx.fill();
// Silly tongue
ctx.fillStyle = '#ff7788';
ctx.beginPath();
ctx.arc(g.x, g.y + sz*0.3, sz*0.25, 0, Math.PI);
ctx.fill();
},
drawPowerup(p) {
p.wobble += 0.05;
const sz = 22 + Math.sin(p.wobble) * 3;
// Glow
const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, sz * 2);
g.addColorStop(0, 'rgba(120,220,255,0.5)');
g.addColorStop(1, 'rgba(120,220,255,0)');
ctx.fillStyle = g;
ctx.beginPath();
ctx.arc(p.x, p.y, sz * 2, 0, Math.PI*2);
ctx.fill();
// Shield shape
ctx.fillStyle = '#5cd8e8';
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(p.x, p.y - sz);
ctx.lineTo(p.x + sz*0.8, p.y - sz*0.3);
ctx.lineTo(p.x + sz*0.8, p.y + sz*0.3);
ctx.quadraticCurveTo(p.x, p.y + sz, p.x - sz*0.8, p.y + sz*0.3);
ctx.lineTo(p.x - sz*0.8, p.y - sz*0.3);
ctx.closePath();
ctx.fill(); ctx.stroke();
// F letter
ctx.fillStyle = '#fff';
ctx.font = 'bold 22px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('F', p.x, p.y);
},
drawDragon() {
const d = this.dragon;
const hurt = d.hurt > 0;

// Body — sticky yellow dragon
ctx.save();
ctx.translate(d.x, d.y);
if (hurt) ctx.filter = 'brightness(1.5)';

// Shadow
ctx.fillStyle = 'rgba(0,0,0,0.3)';
ctx.beginPath();
ctx.ellipse(0, d.size * 0.9, d.size * 0.8, d.size * 0.2, 0, 0, Math.PI*2);
ctx.fill();

// Main body
const bodyG = ctx.createRadialGradient(-d.size*0.2, -d.size*0.2, 0, 0, 0, d.size);
bodyG.addColorStop(0, '#f5e070');
bodyG.addColorStop(1, '#b88830');
ctx.fillStyle = bodyG;
ctx.strokeStyle = '#6a4a10';
ctx.lineWidth = 4;
ctx.beginPath();
// Blob
for (let a = 0; a < Math.PI*2; a += Math.PI/10) {
const r = d.size + Math.sin(a * 3 + d.wobble) * 10;
const px = Math.cos(a) * r;
const py = Math.sin(a) * r;
if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
}
ctx.closePath();
ctx.fill(); ctx.stroke();

// Sticky drips
ctx.fillStyle = '#d4b040';
for (let i = 0; i < 5; i++) {
const a = (i / 5) * Math.PI + Math.PI * 0.2;
const dx = Math.cos(a) * d.size * 0.9;
const dy = Math.sin(a) * d.size * 0.7 + Math.sin(d.wobble + i) * 5;
ctx.beginPath();
ctx.arc(dx, dy, 15, 0, Math.PI, true);
ctx.lineTo(dx + 10, dy + 30);
ctx.lineTo(dx - 10, dy + 30);
ctx.closePath();
ctx.fill();
}

// Eyes
ctx.fillStyle = '#fff';
ctx.beginPath();
ctx.arc(-d.size*0.3, -d.size*0.2, d.size*0.18, 0, Math.PI*2);
ctx.arc(d.size*0.3, -d.size*0.2, d.size*0.18, 0, Math.PI*2);
ctx.fill();
ctx.fillStyle = '#c0202a';
ctx.beginPath();
ctx.arc(-d.size*0.3 + Math.sin(d.wobble)*3, -d.size*0.2, d.size*0.08, 0, Math.PI*2);
ctx.arc(d.size*0.3 + Math.sin(d.wobble)*3, -d.size*0.2, d.size*0.08, 0, Math.PI*2);
ctx.fill();

// Angry eyebrows
ctx.strokeStyle = '#3a2800';
ctx.lineWidth = 6;
ctx.lineCap = 'round';
ctx.beginPath();
ctx.moveTo(-d.size*0.5, -d.size*0.5);
ctx.lineTo(-d.size*0.15, -d.size*0.35);
ctx.moveTo(d.size*0.5, -d.size*0.5);
ctx.lineTo(d.size*0.15, -d.size*0.35);
ctx.stroke();

// Teeth/fangs
ctx.fillStyle = '#fff';
ctx.strokeStyle = '#6a4a10';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(-d.size*0.2, d.size*0.1);
ctx.lineTo(-d.size*0.15, d.size*0.3);
ctx.lineTo(-d.size*0.1, d.size*0.1);
ctx.fill(); ctx.stroke();
ctx.beginPath();
ctx.moveTo(d.size*0.2, d.size*0.1);
ctx.lineTo(d.size*0.15, d.size*0.3);
ctx.lineTo(d.size*0.1, d.size*0.1);
ctx.fill(); ctx.stroke();

ctx.filter = 'none';
ctx.restore();

// HP bar
const bw = 300, bh = 18;
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(W/2 - bw/2, 100, bw, bh, 6);
ctx.fill();
ctx.fillStyle = '#ff4d4d';
roundRect(W/2 - bw/2, 100, bw * (d.hp / d.maxHp), bh, 6);
ctx.fill();
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.strokeRect(W/2 - bw/2, 100, bw, bh);
ctx.fillStyle = '#fff';
ctx.font = 'bold 14px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('تنّين البلاك', W/2, 109);
},
drawBrush() {
ctx.save();
ctx.translate(input.x, input.y);
const brushAngle = -Math.PI/4 + Math.sin(state.t * 0.02) * 0.3;
ctx.rotate(brushAngle);
if (this.shieldTime > 0) {
// Glow
const g = ctx.createRadialGradient(0, 0, 0, 0, 0, 70);
g.addColorStop(0, 'rgba(120,220,255,0.5)');
g.addColorStop(1, 'rgba(120,220,255,0)');
ctx.fillStyle = g;
ctx.beginPath();
ctx.arc(0, 0, 70, 0, Math.PI*2);
ctx.fill();
}
ctx.fillStyle = this.shieldTime > 0 ? '#88ddff' : '#4da6d9';
ctx.strokeStyle = '#2a5a7a';
ctx.lineWidth = 2;
roundRect(-8, 0, 16, 60, 4);
ctx.fill(); ctx.stroke();
ctx.fillStyle = '#fff';
roundRect(-17, -28, 34, 32, 6);
ctx.fill(); ctx.stroke();
ctx.strokeStyle = '#d0d0d0';
ctx.lineWidth = 1.5;
for (let i = -12; i <= 12; i += 3) {
ctx.beginPath();
ctx.moveTo(i, -28);
ctx.lineTo(i, -38);
ctx.stroke();
}
ctx.restore();
}
};
