baskets: null,
spawnTimer: 0,
timeLeft: 50,
lives: 3,
correct: 0,
total: 0,
done: false,
currentFact: null,
factTimer: 0,
draggedItem: null,
hovered: null,
phase: 'kitchen', // 'kitchen' -> 'soda_king'
sodaKing: null,
acidBubbles: [],
milkShields: 3,
init() {
this.items = [];
this.bombs = [];
this.spawnTimer = 0;
this.timeLeft = 50;
this.lives = 3;
this.correct = 0;
this.total = 0;
this.done = false;
this.currentFact = null;
this.factTimer = 0;
this.draggedItem = null;
this.hovered = null;
this.phase = 'kitchen';
this.sodaKing = null;
this.acidBubbles = [];
this.milkShields = 3;
this.baskets = {
good: { x: 140, y: H - 130, w: 200, h: 100, color: '#5cd88a', label: 'أسنان قوية' },
bad: { x: W - 340, y: H - 130, w: 200, h: 100, color: '#d85c5c', label: 'فخ الدكتور دَكاي' }
};
state.score = 0;
},
update(dt) {
if (this.done) return;

if (this.phase === 'kitchen') this.updateKitchen(dt);
else if (this.phase === 'soda_king') this.updateSodaKing(dt);
},
updateKitchen(dt) {
this.timeLeft -= dt;

// Spawn items on conveyor
this.spawnTimer -= dt;
if (this.spawnTimer <= 0 && this.items.length < 6) {
const food = FOODS[Math.floor(Math.random() * FOODS.length)];
this.items.push({
x: W + 40, y: 280,
vx: -80 - (50 - this.timeLeft) * 1.5,
food, size: 40
});
this.spawnTimer = 1.2 + Math.random() * 0.8;
}

// Spawn sugar rush bombs occasionally
if (Math.random() < 0.003 && this.bombs.length < 2) {
this.bombs.push({
x: 150 + Math.random() * (W - 300),
y: 140 + Math.random() * 80,
size: 40, taps: 3, fuse: 8, wobble: 0
});
}

// Move items
for (let i = this.items.length - 1; i >= 0; i--) {
const it = this.items[i];
if (this.draggedItem !== it) it.x += it.vx * dt;
if (it.x < -50) {
this.items.splice(i, 1);
// Missed a food — only penalize if it was good
if (it.food.good) {
this.lives--;
SFX.bad();
addFloat(0, 280, '-1 ❤️', '#ff6b8a', 28);
}
}
}

// Update bombs
for (let i = this.bombs.length - 1; i >= 0; i--) {
const b = this.bombs[i];
b.wobble += dt * 5;
b.fuse -= dt;
if (b.fuse <= 0) {
// Explode
addParticle(b.x, b.y, '#ff4d4d', 25, 2);
addFloat(b.x, b.y, 'تسوّس!', '#ff4d4d', 32);
this.lives--;
SFX.hit();
this.bombs.splice(i, 1);
}
}

// Drag logic
if (input.justPressed && !this.draggedItem) {
// Check items
for (const it of this.items) {
const dx = it.x - input.x, dy = it.y - input.y;
if (dx*dx + dy*dy < it.size*it.size) {
this.draggedItem = it;
SFX.click();
break;
}
}
// Check bombs (tap)
for (let i = this.bombs.length - 1; i >= 0; i--) {
const b = this.bombs[i];
const dx = b.x - input.x, dy = b.y - input.y;
if (dx*dx + dy*dy < b.size*b.size) {
b.taps--;
addParticle(b.x, b.y, '#ffdd66', 8);
SFX.pop();
if (b.taps <= 0) {
addParticle(b.x, b.y, '#aaffaa', 20, 1.5);
addFloat(b.x, b.y, 'تم إبطالها!', '#aaffaa', 24);
state.score += 200;
addPearl(b.x, b.y); state.pearlPoints += 2; save();
this.bombs.splice(i, 1);
SFX.powerup();
}
break;
}
}
}

if (this.draggedItem) {
if (input.down) {
this.draggedItem.x = input.x;
this.draggedItem.y = input.y;
// Check hover on baskets for fact
if (this.draggedItem.y > H - 180) {
this.currentFact = (this.draggedItem.food.good ? '✓ ' : '✗ ') + this.draggedItem.food.name + ': ' + this.draggedItem.food.fact;
this.factTimer = 1;
}
} else {
// Released — check basket
const item = this.draggedItem;
let placed = false;
for (const key of ['good', 'bad']) {
const b = this.baskets[key];
if (item.x >= b.x && item.x <= b.x + b.w && item.y >= b.y && item.y <= b.y + b.h) {
placed = true;
const correct = (key === 'good' && item.food.good) || (key === 'bad' && !item.food.good);
if (correct) {
state.score += 150;
this.correct++;
addParticle(item.x, item.y, '#88ff88', 12);
addFloat(item.x, item.y, '+150', '#aaffaa');
SFX.good();
this.currentFact = '✓ ' + item.food.name + ': ' + item.food.fact;
if (Math.random() < 0.4) { addPearl(item.x, item.y); state.pearlPoints++; save(); }
} else {
this.lives--;
addParticle(item.x, item.y, '#ff6666', 14);
addFloat(item.x, item.y, '-❤️', '#ff8888');
SFX.bad();
this.currentFact = '✗ ' + item.food.name + ': ' + item.food.fact;
}
this.factTimer = 2.5;
this.total++;
const idx = this.items.indexOf(item);
if (idx >= 0) this.items.splice(idx, 1);
break;
}
}
if (!placed) {
// snapback
this.draggedItem.vx = -80;
}
this.draggedItem = null;
}
}

this.factTimer -= dt;

// Check end
if (this.timeLeft <= 0 || this.lives <= 0) {
// Enter Soda King boss if performed well
if (this.lives > 0 && this.correct >= 6) {
this.phase = 'soda_king';
this.sodaKing = { x: W/2, y: 200, size: 90, hp: 12, maxHp: 12, wobble: 0, shootTimer: 1, hurt: 0 };
SFX.bossRoar();
addFloat(W/2, H/2 - 100, 'ملك الصودا قادم!', '#c06aff', 36);
return;
}
this.done = true;
setTimeout(() => this.showResult(), 600);
}
},
updateSodaKing(dt) {
const k = this.sodaKing;
k.wobble += dt * 3;
if (k.hurt > 0) k.hurt -= dt * 2;
// Float side to side
k.x = W/2 + Math.sin(state.t * 0.003) * 200;
k.y = 200 + Math.sin(state.t * 0.005) * 30;

// Shoot acid bubbles
k.shootTimer -= dt;
if (k.shootTimer <= 0) {
k.shootTimer = Math.max(0.5, 1.5 - (12 - k.hp) * 0.1);
const angle = Math.atan2(H - 130 - k.y, (W/2) - k.x) + (Math.random() - 0.5) * 0.6;
this.acidBubbles.push({
x: k.x, y: k.y + k.size*0.5,
vx: Math.cos(angle) * 150, vy: Math.sin(angle) * 150,
size: 15, life: 5
});
SFX.fizz();
}

// Update acid bubbles
for (let i = this.acidBubbles.length - 1; i >= 0; i--) {
const b = this.acidBubbles[i];
b.x += b.vx * dt; b.y += b.vy * dt;
b.life -= dt;
if (b.life <= 0 || b.y > H) { this.acidBubbles.splice(i, 1); continue; }
// Hit shield (bottom area)
if (b.y > H - 150 && b.y < H - 100) {
if (this.milkShields > 0) {
this.milkShields--;
addParticle(b.x, b.y, '#fff', 15);
SFX.shield();
this.acidBubbles.splice(i, 1);
continue;
} else {
this.lives--;
addParticle(b.x, b.y, '#ff4d4d', 15);
SFX.hit();
this.acidBubbles.splice(i, 1);
if (this.lives <= 0) {
this.done = true;
setTimeout(() => this.showResult(), 600);
return;
}
}
}
}

// Click to shoot milk at king
if (input.clicked) {
const dx = input.x - k.x, dy = input.y - k.y;
if (dx*dx + dy*dy < k.size*k.size) {
k.hp--;
k.hurt = 0.3;
state.score += 200;
addParticle(input.x, input.y, '#fff', 15);
addFloat(input.x, input.y, '+200', '#fff', 22);
SFX.bossHit();
if (Math.random() < 0.3) { addPearl(input.x, input.y); state.pearlPoints++; save(); }
if (k.hp <= 0) {
this.done = true;
addParticle(k.x, k.y, '#c06aff', 40, 2);
for (let i = 0; i < 6; i++) { addPearl(k.x + (Math.random()-0.5)*100, k.y + (Math.random()-0.5)*100); state.pearlPoints++; }
save();
SFX.victory();
setTimeout(() => this.showResult(), 1200);
}
}
}
},
showResult() {
let stars = 0;
if (this.phase === 'kitchen') {
const acc = this.total > 0 ? this.correct / this.total : 0;
if (acc >= 0.5) stars = 1;
if (acc >= 0.8 && this.lives >= 2) stars = 2;
} else {
stars = 2;
if (this.sodaKing && this.sodaKing.hp <= 0) stars = 3;
}
state.stars[1] = Math.max(state.stars[1], stars);
state.totalScore += state.score;
save();
if (stars > 0) SFX.win(); else SFX.lose();
state.scene = 'result';
resultScene.init(stars, state.score, 'مغامرة المطبخ');
},
draw() {
drawBackground('kitchen');

if (this.phase === 'kitchen') this.drawKitchen();
else this.drawSodaKing();

drawParticles();

if (drawButton(W/2 - 70, H - 45, 140, 35, 'خروج', '#a04545', '#702525', 'bold 16px Cairo')) {
SFX.click();
state.scene = 'menu';
}
},
drawKitchen() {
// Conveyor belt
const beltY = 260, beltH = 60;
ctx.fillStyle = '#2a3848';
ctx.fillRect(0, beltY, W, beltH);
// Belt lines moving
ctx.strokeStyle = '#4a5868';
ctx.lineWidth = 2;
const offset = (state.t * 3) % 40;
for (let x = -40 + offset; x < W + 40; x += 40) {
ctx.beginPath();
ctx.moveTo(x, beltY);
ctx.lineTo(x - 20, beltY + beltH);
ctx.stroke();
}
// Belt rollers
ctx.fillStyle = '#888';
ctx.beginPath();
ctx.arc(30, beltY + beltH/2, 20, 0, Math.PI*2);
ctx.arc(W - 30, beltY + beltH/2, 20, 0, Math.PI*2);
ctx.fill();

// HUD
// Score
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(20, 20, 180, 50, 10);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'right';
ctx.textBaseline = 'middle';
ctx.fillText(`النقاط: ${state.score}`, 185, 45);

// Lives
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(W/2 - 80, 20, 160, 50, 10);
ctx.fill();
ctx.textAlign = 'center';
ctx.font = 'bold 22px Cairo';
ctx.fillStyle = '#ff6b8a';
ctx.fillText('❤️ '.repeat(this.lives).trim() || '💔', W/2, 45);

// Timer
ctx.fillStyle = this.timeLeft < 10 ? 'rgba(200,60,60,0.6)' : 'rgba(0,0,0,0.5)';
roundRect(W - 200, 20, 180, 50, 10);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'left';
ctx.fillText(`الوقت: ${Math.max(0, Math.ceil(this.timeLeft))}`, W - 185, 45);

// Instruction
ctx.fillStyle = 'rgba(255,255,255,0.9)';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'center';
ctx.fillText('اسحب الأطعمة إلى السلّة الصحيحة — وانقر القنابل 3 مرات!', W/2, 100);

// Baskets
for (const key of ['good', 'bad']) {
const b = this.baskets[key];
const hover = this.draggedItem && this.draggedItem.x >= b.x && this.draggedItem.x <= b.x + b.w && this.draggedItem.y >= b.y && this.draggedItem.y <= b.y + b.h;
ctx.fillStyle = hover ? shade(b.color, 30) : b.color;
ctx.strokeStyle = '#fff';
ctx.lineWidth = 3;
roundRect(b.x, b.y, b.w, b.h, 16);
ctx.fill(); ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = 'bold 22px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 4;
ctx.fillText(b.label, b.x + b.w/2, b.y + b.h/2);
ctx.shadowBlur = 0;
}

// Draw items
for (const it of this.items) {
if (it === this.draggedItem) continue;
this.drawFoodItem(it);
}

// Bombs
for (const b of this.bombs) {
this.drawBomb(b);
}

// Draw dragged item last
if (this.draggedItem) this.drawFoodItem(this.draggedItem, true);

// Fact panel
if (this.currentFact && this.factTimer > 0) {
const alpha = Math.min(1, this.factTimer / 0.3);
ctx.fillStyle = `rgba(20,30,50,${alpha * 0.85})`;
roundRect(W/2 - 280, 140, 560, 50, 10);
ctx.fill();
ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.5})`;
ctx.stroke();
ctx.fillStyle = `rgba(255,255,255,${alpha})`;
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(this.currentFact, W/2, 165);
}
},
drawFoodItem(it, dragging = false) {
ctx.save();
if (dragging) {
ctx.shadowColor = 'rgba(0,0,0,0.5)';
ctx.shadowBlur = 15;
ctx.shadowOffsetY = 5;
}
// Glow
const glowColor = it.food.good ? 'rgba(150,255,150,0.3)' : 'rgba(255,100,100,0.3)';
const glow = ctx.createRadialGradient(it.x, it.y, 0, it.x, it.y, 45);
glow.addColorStop(0, glowColor);
glow.addColorStop(1, 'rgba(0,0,0,0)');
ctx.fillStyle = glow;
ctx.fillRect(it.x - 45, it.y - 45, 90, 90);
// Emoji
ctx.font = '52px serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(it.food.emoji, it.x, it.y);
// Name label
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(it.x - 40, it.y + 30, 80, 22, 6);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 14px Cairo';
ctx.fillText(it.food.name, it.x, it.y + 41);
ctx.restore();
},
drawBomb(b) {
// Pulsing warning glow
const pulse = 0.5 + 0.5 * Math.sin(b.wobble * 3);
const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size * 1.5);
glow.addColorStop(0, `rgba(255,80,80,${0.4 + pulse * 0.3})`);
glow.addColorStop(1, 'rgba(255,80,80,0)');
ctx.fillStyle = glow;
ctx.beginPath();
ctx.arc(b.x, b.y, b.size * 1.5, 0, Math.PI*2);
ctx.fill();
// Body
ctx.fillStyle = '#4a1a1a';
ctx.strokeStyle = '#ff4d4d';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
ctx.fill(); ctx.stroke();
// Sugar crystals pattern
ctx.fillStyle = '#fff';
for (let i = 0; i < 6; i++) {
const a = b.wobble + (i / 6) * Math.PI * 2;
const r = b.size * 0.5;
ctx.beginPath();
ctx.arc(b.x + Math.cos(a) * r, b.y + Math.sin(a) * r, 3, 0, Math.PI*2);
ctx.fill();
}
// Fuse
ctx.strokeStyle = '#ffaa22';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.moveTo(b.x + b.size*0.5, b.y - b.size*0.5);
ctx.quadraticCurveTo(b.x + b.size, b.y - b.size, b.x + b.size*1.2, b.y - b.size*1.2);
ctx.stroke();
ctx.fillStyle = '#ffdd44';
ctx.beginPath();
ctx.arc(b.x + b.size*1.2, b.y - b.size*1.2, 5 + Math.sin(b.wobble*5)*2, 0, Math.PI*2);
ctx.fill();
// Taps counter
ctx.fillStyle = '#fff';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(b.taps, b.x, b.y);
},
drawSodaKing() {
const k = this.sodaKing;

// Instruction
ctx.fillStyle = 'rgba(255,255,255,0.95)';
ctx.font = 'bold 22px Cairo';
ctx.textAlign = 'center';
ctx.shadowColor = 'rgba(0,0,0,0.6)';
ctx.shadowBlur = 4;
ctx.fillText('انقر على ملك الصودا! درع الحليب يحميك من الحمض!', W/2, 100);
ctx.shadowBlur = 0;

// HUD — hp bar of king
const bw = 400, bh = 20;
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(W/2 - bw/2, 140, bw, bh, 6);
ctx.fill();
ctx.fillStyle = '#c06aff';
roundRect(W/2 - bw/2, 140, bw * (k.hp / k.maxHp), bh, 6);
ctx.fill();
ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(W/2 - bw/2, 140, bw, bh);
ctx.fillStyle = '#fff';
ctx.font = 'bold 14px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(`ملك الصودا`, W/2, 150);

// Lives and score
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(20, 20, 180, 50, 10);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'right';
ctx.fillText(`النقاط: ${state.score}`, 185, 45);

ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(W - 200, 20, 180, 50, 10);
ctx.fill();
ctx.fillStyle = '#ff6b8a';
ctx.textAlign = 'left';
ctx.fillText(`❤️ ${this.lives}`, W - 185, 45);

// Draw Soda King
ctx.save();
ctx.translate(k.x, k.y);
ctx.rotate(Math.sin(k.wobble) * 0.1);
if (k.hurt > 0) ctx.filter = 'brightness(1.5)';
// Can body
const canGrad = ctx.createLinearGradient(-k.size*0.6, 0, k.size*0.6, 0);
canGrad.addColorStop(0, '#8c3eb4');
canGrad.addColorStop(0.5, '#c06aff');
canGrad.addColorStop(1, '#6a2ba0');
ctx.fillStyle = canGrad;
ctx.strokeStyle = '#3a1050';
ctx.lineWidth = 4;
roundRect(-k.size*0.6, -k.size*0.8, k.size*1.2, k.size*1.6, 12);
ctx.fill(); ctx.stroke();
// Top rim
ctx.fillStyle = '#aaa';
roundRect(-k.size*0.6, -k.size*0.88, k.size*1.2, k.size*0.12, 4);
ctx.fill(); ctx.stroke();
// Pull tab
ctx.fillStyle = '#888';
roundRect(-k.size*0.1, -k.size*0.95, k.size*0.2, k.size*0.1, 3);
ctx.fill(); ctx.stroke();

// Label
ctx.fillStyle = '#fff';
ctx.strokeStyle = '#3a1050';
ctx.lineWidth = 2;
ctx.font = `bold ${Math.floor(k.size*0.25)}px Cairo`;
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.strokeText('COLA', 0, 0);
ctx.fillText('COLA', 0, 0);

// Evil face
ctx.fillStyle = '#fff';
ctx.beginPath();
ctx.arc(-k.size*0.2, -k.size*0.35, k.size*0.12, 0, Math.PI*2);
ctx.arc(k.size*0.2, -k.size*0.35, k.size*0.12, 0, Math.PI*2);
ctx.fill();
ctx.fillStyle = '#c0202a';
ctx.beginPath();
ctx.arc(-k.size*0.2, -k.size*0.35, k.size*0.06, 0, Math.PI*2);
ctx.arc(k.size*0.2, -k.size*0.35, k.size*0.06, 0, Math.PI*2);
ctx.fill();
ctx.strokeStyle = '#fff';
ctx.lineWidth = 3;
ctx.beginPath();
ctx.arc(0, k.size*0.3, k.size*0.2, 1.1*Math.PI, 1.9*Math.PI);
ctx.stroke();

// Crown
ctx.fillStyle = '#ffd866';
ctx.strokeStyle = '#b88a20';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(-k.size*0.4, -k.size*0.9);
ctx.lineTo(-k.size*0.3, -k.size*1.15);
ctx.lineTo(-k.size*0.15, -k.size*0.95);
ctx.lineTo(0, -k.size*1.2);
ctx.lineTo(k.size*0.15, -k.size*0.95);
ctx.lineTo(k.size*0.3, -k.size*1.15);
ctx.lineTo(k.size*0.4, -k.size*0.9);
ctx.closePath();
ctx.fill(); ctx.stroke();

// Fizz bubbles
for (let i = 0; i < 8; i++) {
const bx = -k.size*0.5 + Math.random() * k.size;
const by = -k.size*0.6 + ((state.t * 2 + i * 30) % 120) - 60;
ctx.fillStyle = `rgba(255,255,255,${0.7 - Math.abs(by)/120})`;
ctx.beginPath();
ctx.arc(bx, by, 3, 0, Math.PI*2);
ctx.fill();
}

ctx.filter = 'none';
ctx.restore();

// Acid bubbles
for (const b of this.acidBubbles) {
const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size * 2);
glow.addColorStop(0, 'rgba(200,100,255,0.4)');
glow.addColorStop(1, 'rgba(200,100,255,0)');
ctx.fillStyle = glow;
ctx.beginPath(); ctx.arc(b.x, b.y, b.size * 2, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#c06aff';
ctx.beginPath();
ctx.arc(b.x, b.y, b.size, 0, Math.PI*2);
ctx.fill();
ctx.fillStyle = 'rgba(255,255,255,0.6)';
ctx.beginPath();
ctx.arc(b.x - b.size*0.3, b.y - b.size*0.3, b.size*0.3, 0, Math.PI*2);
ctx.fill();
}

// Milk shield bar at bottom
const shieldY = H - 140;
for (let i = 0; i < 3; i++) {
const sx = W/2 - 90 + i * 60;
if (i < this.milkShields) {
// Active milk shield
const g = ctx.createRadialGradient(sx, shieldY, 0, sx, shieldY, 30);
g.addColorStop(0, 'rgba(255,255,255,0.6)');
g.addColorStop(1, 'rgba(255,255,255,0)');
ctx.fillStyle = g;
ctx.beginPath(); ctx.arc(sx, shieldY, 30, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#fff';
ctx.strokeStyle = '#88b8e0';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(sx, shieldY - 22);
ctx.lineTo(sx + 18, shieldY - 8);
ctx.lineTo(sx + 18, shieldY + 8);
ctx.quadraticCurveTo(sx, shieldY + 22, sx - 18, shieldY + 8);
ctx.lineTo(sx - 18, shieldY - 8);
ctx.closePath();
ctx.fill(); ctx.stroke();
ctx.fillStyle = '#88b8e0';
ctx.font = 'bold 16px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('🥛', sx, shieldY);
} else {
ctx.strokeStyle = 'rgba(255,255,255,0.2)';
ctx.lineWidth = 2;
ctx.setLineDash([4, 4]);
ctx.beginPath();
ctx.arc(sx, shieldY, 20, 0, Math.PI*2);
ctx.stroke();
ctx.setLineDash([]);
}
}
}
};

// =========================================================================
// LEVEL 3: FLUORIDE FORTRESS + DR. DECAY FINAL BOSS
// Tower defense + riddle between waves + Dr. Decay fight
// =========================================================================
const RIDDLES = [
{ q: 'أنا أحبك لكن لا تأكلني كثيراً، من أنا؟', a: 'tamr', options: [
{ text: 'التمر', key: 'tamr', correct: true },
{ text: 'الخيار', key: 'khiar', correct: false },
{ text: 'الماء', key: 'ma', correct: false }
]},
{ q: 'أنا أبيض وأقوّي عظامك، من أنا؟', a: 'milk', options: [
{ text: 'الحليب', key: 'milk', correct: true },
{ text: 'العسل', key: 'honey', correct: false },
{ text: 'الشاي', key: 'tea', correct: false }
]},
{ q: 'أنا أحمي أسنانك من التسوّس، أستعمل مرتين يومياً، من أنا؟', a: 'brush', options: [
{ text: 'فرشاة الأسنان', key: 'brush', correct: true },
{ text: 'الملعقة', key: 'spoon', correct: false },
{ text: 'المنديل', key: 'napkin', correct: false }
]},
{ q: 'أنا سائل يحمي المينا وأوجد في معجون الأسنان، من أنا؟', a: 'fl', options: [
{ text: 'الفلورايد', key: 'fl', correct: true },
{ text: 'السكر', key: 'sugar', correct: false },
{ text: 'الدهن', key: 'fat', correct: false }
]}
];

const level3 = {
fortress: null,
enemies: [],
bullets: [],
towers: [], // placed defenses
spawnTimer: 0,
wave: 1,
maxWaves: 3, // after 3 waves -> Dr. Decay
enemiesSpawned: 0,
waveTotal: 8,
done: false,
phase: 'wave', // 'wave', 'riddle', 'boss'
currentRiddle: null,
riddleAnswered: false,
placingTower: null,
drDecay: null,
bossPhase: 0,
bossActionTimer: 0,
init() {
this.fortress = { x: W/2, y: H/2 + 40, hp: 100, maxHp: 100 };
this.enemies = [];
this.bullets = [];
this.towers = [];
this.spawnTimer = 1;
this.wave = 1;
this.enemiesSpawned = 0;
this.waveTotal = 8;
this.done = false;
this.phase = 'wave';
this.currentRiddle = null;
this.placingTower = null;
this.drDecay = null;
this.bossPhase = 0;
this.bossActionTimer = 0;
state.score = 0;
},
update(dt) {
if (this.done) return;
if (this.phase === 'wave') this.updateWave(dt);
else if (this.phase === 'riddle') this.updateRiddle(dt);
else if (this.phase === 'boss') this.updateBoss(dt);
},
updateWave(dt) {
// Shoot from fortress
if (input.justPressed && !this.placingTower) {
this.shootFromFortress();
} else if (input.down && state.t % 10 === 0 && !this.placingTower) {
this.shootFromFortress();
}

// Place tower if one is chosen
if (this.placingTower && input.justPressed) {
if (state.score >= this.placingTower.cost) {
state.score -= this.placingTower.cost;
this.towers.push({
x: input.x, y: input.y,
type: this.placingTower.type,
cooldown: 0,
range: this.placingTower.range
});
SFX.powerup();
this.placingTower = null;
} else {
SFX.bad();
}
}

// Towers auto-fire
for (const t of this.towers) {
t.cooldown -= dt;
if (t.cooldown <= 0) {
// Find nearest enemy
let closest = null, closestD = Infinity;
for (const e of this.enemies) {
const dx = e.x - t.x, dy = e.y - t.y;
const d = Math.sqrt(dx*dx + dy*dy);
if (d < t.range && d < closestD) { closest = e; closestD = d; }
}
if (closest) {
if (t.type === 'toothpaste') {
const angle = Math.atan2(closest.y - t.y, closest.x - t.x);
this.bullets.push({
x: t.x, y: t.y,
vx: Math.cos(angle) * 400, vy: Math.sin(angle) * 400,
life: 1.5, damage: 1, fromTower: true
});
SFX.shoot();
t.cooldown = 0.6;
} else if (t.type === 'floss') {
// Instant damage
closest.hp -= 2;
addParticle(closest.x, closest.y, '#fff', 10);
SFX.hit();
// Draw line
addFloat(closest.x, closest.y, '-2', '#fff', 20);
if (closest.hp <= 0) this.killEnemy(closest);
t.cooldown = 1.5;
} else if (t.type === 'mouthwash') {
// AoE slow
for (const e of this.enemies) {
const d = Math.sqrt((e.x-t.x)**2 + (e.y-t.y)**2);
if (d < t.range) {
e.hp -= 0.5;
e.slowTime = 2;
if (e.hp <= 0) this.killEnemy(e);
}
}
addParticle(t.x, t.y, '#88ddff', 20, 2);
SFX.fizz();
t.cooldown = 3;
}
}
}
}

// Spawn wave
if (this.enemiesSpawned < this.waveTotal) {
this.spawnTimer -= dt;
if (this.spawnTimer <= 0) {
this.spawnEnemy();
this.spawnTimer = Math.max(0.3, 1.1 - this.wave * 0.15);
this.enemiesSpawned++;
}
} else if (this.enemies.length === 0) {
// Wave cleared
SFX.levelUp();
addFloat(W/2, H/2 - 100, `الموجة ${this.wave} انتهت!`, '#ffd866', 32);
if (this.wave >= this.maxWaves) {
// Enter Dr. Decay fight
this.phase = 'boss';
this.drDecay = {
x: W/2, y: 180, size: 110,
hp: 25, maxHp: 25, wobble: 0, hurt: 0,
actionCooldown: 3, phase: 0
};
SFX.bossRoar();
addFloat(W/2, H/2 - 40, 'الدكتور دَكاي!', '#ff4d4d', 42);
} else {
// Enter riddle
this.phase = 'riddle';
this.currentRiddle = RIDDLES[Math.floor(Math.random() * RIDDLES.length)];
this.riddleAnswered = false;
}
}

// Update bullets + enemies (shared code)
this.updateBullets(dt);
this.updateEnemies(dt);
},
updateRiddle(dt) {
// Waiting for answer — handled in draw via click detection
},
updateBoss(dt) {
const d = this.drDecay;
d.wobble += dt * 3;
if (d.hurt > 0) d.hurt -= dt * 2;
d.actionCooldown -= dt;

// Move side to side
d.x = W/2 + Math.sin(state.t * 0.002) * 280;

// Boss actions (3 different attacks rotating)
if (d.actionCooldown <= 0) {
d.actionCooldown = Math.max(1.5, 3.5 - (25 - d.hp) * 0.1);
d.phase = (d.phase + 1) % 3;
if (d.phase === 0) {
// Summon decay monsters
for (let k = 0; k < 3; k++) {
setTimeout(() => this.spawnEnemy(true), k * 300);
}
SFX.bossRoar();
} else if (d.phase === 1) {
// Volley of drill shots
for (let k = 0; k < 5; k++) {
const angle = Math.atan2(this.fortress.y - d.y, this.fortress.x - d.x) + (k - 2) * 0.2;
this.bullets.push({
x: d.x, y: d.y,
vx: Math.cos(angle) * 250, vy: Math.sin(angle) * 250,
life: 3, damage: 8, enemy: true, drill: true
});
}
SFX.shoot();
} else {
// Sticky ground zone (damage over time for fortress)
addFloat(d.x, d.y + 50, '⚠', '#ff4d4d', 32);
}
}

// Click to shoot at Dr. Decay
if (input.justPressed) {
const dx = input.x - d.x, dy = input.y - d.y;
if (dx*dx + dy*dy < d.size * d.size * 1.5) {
d.hp--;
d.hurt = 0.3;
state.score += 300;
addParticle(input.x, input.y, '#88ddff', 15);
addFloat(input.x, input.y, '-1', '#88ddff', 22);
SFX.bossHit();
if (Math.random() < 0.3) { addPearl(input.x, input.y); state.pearlPoints++; save(); }
if (d.hp <= 0) {
this.done = true;
state.unlockedCertificate = true;
addParticle(d.x, d.y, '#ffdd66', 60, 3);
addParticle(d.x, d.y, '#ff8844', 40, 3);
for (let i = 0; i < 15; i++) { addPearl(d.x + (Math.random()-0.5)*200, d.y + (Math.random()-0.5)*200); state.pearlPoints++; }
save();
SFX.victory();
setTimeout(() => this.showResult(true), 1500);
return;
}
} else {
// Otherwise shoot normally
this.shootFromFortress();
}
}

this.updateBullets(dt);
this.updateEnemies(dt);
},
shootFromFortress() {
const dx = input.x - this.fortress.x;
const dy = input.y - this.fortress.y;
const d = Math.sqrt(dx*dx + dy*dy) || 1;
this.bullets.push({
x: this.fortress.x, y: this.fortress.y,
vx: dx/d * 500, vy: dy/d * 500,
life: 2, damage: 1
});
SFX.shoot();
},
spawnEnemy(fromBoss = false) {
const side = Math.floor(Math.random() * 4);
let x, y;
if (side === 0) { x = Math.random() * W; y = -30; }
else if (side === 1) { x = W + 30; y = Math.random() * H; }
else if (side === 2) { x = Math.random() * W; y = H + 30; }
else { x = -30; y = Math.random() * H; }

const types = [
{ size: 20, hp: 2, speed: 45, damage: 8, color1: '#b84060', color2: '#6a2035' },
{ size: 25, hp: 3, speed: 35, damage: 12, color1: '#a040a0', color2: '#5a2060' },
{ size: 17, hp: 1, speed: 75, damage: 6, color1: '#40a0b8', color2: '#205a6a' }
];
const type = types[Math.floor(Math.random() * types.length)];
const bonus = Math.floor(this.wave / 2);
this.enemies.push({
x, y,
size: type.size,
hp: type.hp + bonus + (fromBoss ? 1 : 0),
maxHp: type.hp + bonus + (fromBoss ? 1 : 0),
speed: type.speed + this.wave * 4,
damage: type.damage,
color1: type.color1,
color2: type.color2,
wobble: Math.random() * Math.PI * 2,
slowTime: 0
});
},
updateEnemies(dt) {
for (let i = this.enemies.length - 1; i >= 0; i--) {
const e = this.enemies[i];
const dx = this.fortress.x - e.x;
const dy = this.fortress.y - e.y;
const d = Math.sqrt(dx*dx + dy*dy) || 1;
const speedMult = e.slowTime > 0 ? 0.4 : 1;
e.x += (dx/d) * e.speed * speedMult * dt;
e.y += (dy/d) * e.speed * speedMult * dt;
e.wobble += dt * 5;
if (e.slowTime > 0) e.slowTime -= dt;

if (d < 55 + e.size) {
this.fortress.hp -= e.damage;
this.enemies.splice(i, 1);
addParticle(this.fortress.x, this.fortress.y, '#ff6666', 10);
SFX.hit();
if (this.fortress.hp <= 0) {
this.fortress.hp = 0;
this.done = true;
setTimeout(() => this.showResult(false), 600);
}
}
}
},
updateBullets(dt) {
for (let i = this.bullets.length - 1; i >= 0; i--) {
const b = this.bullets[i];
b.x += b.vx * dt;
b.y += b.vy * dt;
b.life -= dt;
if (b.life <= 0 || b.x < -50 || b.x > W+50 || b.y < -50 || b.y > H+50) {
this.bullets.splice(i, 1);
continue;
}
if (b.enemy) {
// Hit fortress
const dx = this.fortress.x - b.x, dy = this.fortress.y - b.y;
if (dx*dx + dy*dy < 55*55) {
this.fortress.hp -= b.damage;
addParticle(b.x, b.y, '#ff4d4d', 10);
SFX.hit();
this.bullets.splice(i, 1);
if (this.fortress.hp <= 0) {
this.fortress.hp = 0;
this.done = true;
setTimeout(() => this.showResult(false), 600);
return;
}
}
} else {
// Hit enemies
for (let j = this.enemies.length - 1; j >= 0; j--) {
const e = this.enemies[j];
const dx = e.x - b.x, dy = e.y - b.y;
if (dx*dx + dy*dy < (e.size + 8) * (e.size + 8)) {
e.hp -= b.damage;
this.bullets.splice(i, 1);
addParticle(b.x, b.y, '#88ccff', 5);
if (e.hp <= 0) this.killEnemy(e);
break;
}
}
}
}
},
killEnemy(e) {
const idx = this.enemies.indexOf(e);
if (idx >= 0) this.enemies.splice(idx, 1);
state.score += 50 * this.wave;
addParticle(e.x, e.y, e.color1, 15);
addFloat(e.x, e.y, '+' + (50 * this.wave), '#ffaacc');
if (Math.random() < 0.4) { addPearl(e.x, e.y); state.pearlPoints++; save(); }
SFX.hit();
},
showResult(won) {
let stars = 0;
if (won) {
stars = 1;
if (this.fortress.hp >= 50) stars = 2;
if (this.fortress.hp >= 80) stars = 3;
}
state.stars[2] = Math.max(state.stars[2], stars);
state.totalScore += state.score;
save();
if (stars > 0) SFX.victory(); else SFX.lose();
state.scene = 'result';
resultScene.init(stars, state.score, 'قلعة الفلورايد');
},
draw() {
drawBackground('fortress');
this.drawGrid();

if (this.phase === 'wave' || this.phase === 'boss') {
this.drawGame();
}

if (this.phase === 'riddle') {
this.drawRiddle();
}

drawParticles();

if (drawButton(20, H - 50, 120, 40, 'خروج', '#a04545', '#702525', 'bold 16px Cairo')) {
SFX.click();
state.scene = 'menu';
}
},
drawGrid() {
ctx.strokeStyle = 'rgba(100,200,255,0.06)';
ctx.lineWidth = 1;
for (let x = 0; x < W; x += 40) {
ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
}
for (let y = 0; y < H; y += 40) {
ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
}
},
drawGame() {
const f = this.fortress;
// Shield aura
const aura = ctx.createRadialGradient(f.x, f.y, 40, f.x, f.y, 110);
aura.addColorStop(0, 'rgba(100,200,255,0.2)');
aura.addColorStop(1, 'rgba(100,200,255,0)');
ctx.fillStyle = aura;
ctx.fillRect(0, 0, W, H);
ctx.strokeStyle = `rgba(100,200,255,${0.3 + Math.sin(state.t * 0.005) * 0.2})`;
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(f.x, f.y, 105, 0, Math.PI*2);
ctx.stroke();

// Castle walls around lammaa
ctx.fillStyle = 'rgba(200,220,240,0.15)';
ctx.strokeStyle = 'rgba(200,220,240,0.4)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(f.x, f.y, 75, 0, Math.PI*2);
ctx.fill(); ctx.stroke();
// Castle battlements
for (let i = 0; i < 12; i++) {
const a = (i / 12) * Math.PI * 2;
const rx = f.x + Math.cos(a) * 75;
const ry = f.y + Math.sin(a) * 75;
ctx.fillStyle = 'rgba(200,220,240,0.5)';
ctx.beginPath();
ctx.arc(rx, ry, 6, 0, Math.PI*2);
ctx.fill();
}

drawLammaa(f.x, f.y, 55, f.hp < 30 ? 'hurt' : 'happy', state.t * 0.003);

// Towers
for (const t of this.towers) {
this.drawTower(t);
}

// Enemies
for (const e of this.enemies) {
this.drawEnemy(e);
}

// Bullets
for (const b of this.bullets) {
if (b.enemy) {
// Drill projectile
ctx.fillStyle = '#888';
ctx.strokeStyle = '#333';
ctx.lineWidth = 1;
ctx.save();
ctx.translate(b.x, b.y);
ctx.rotate(Math.atan2(b.vy, b.vx));
ctx.beginPath();
ctx.moveTo(-10, -4);
ctx.lineTo(10, 0);
ctx.lineTo(-10, 4);
ctx.closePath();
ctx.fill(); ctx.stroke();
ctx.restore();
} else {
const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, 12);
g.addColorStop(0, '#ffffff');
g.addColorStop(0.4, '#88ddff');
g.addColorStop(1, 'rgba(100,200,255,0)');
ctx.fillStyle = g;
ctx.beginPath(); ctx.arc(b.x, b.y, 12, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#fff';
ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
}
}

// Boss
if (this.phase === 'boss' && this.drDecay) {
drawDrDecay(this.drDecay.x, this.drDecay.y, this.drDecay.size, 'evil', this.drDecay.wobble);
// Boss HP bar
const bw = 500, bh = 22;
ctx.fillStyle = 'rgba(0,0,0,0.6)';
roundRect(W/2 - bw/2, 120, bw, bh, 6);
ctx.fill();
ctx.fillStyle = '#ff2040';
roundRect(W/2 - bw/2, 120, bw * (this.drDecay.hp / this.drDecay.maxHp), bh, 6);
ctx.fill();
ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(W/2 - bw/2, 120, bw, bh);
ctx.fillStyle = '#fff';
ctx.font = 'bold 16px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('الدكتور دَكاي', W/2, 131);
}

// Aim line
ctx.strokeStyle = 'rgba(150,220,255,0.3)';
ctx.lineWidth = 1;
ctx.setLineDash([5, 5]);
ctx.beginPath();
ctx.moveTo(f.x, f.y);
ctx.lineTo(input.x, input.y);
ctx.stroke();
ctx.setLineDash([]);

// Placing tower preview
if (this.placingTower) {
ctx.globalAlpha = 0.5;
this.drawTower({ x: input.x, y: input.y, type: this.placingTower.type, range: this.placingTower.range });
ctx.globalAlpha = 1;
ctx.strokeStyle = 'rgba(255,255,255,0.3)';
ctx.setLineDash([4,4]);
ctx.beginPath();
ctx.arc(input.x, input.y, this.placingTower.range, 0, Math.PI*2);
ctx.stroke();
ctx.setLineDash([]);
}

// HUD
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(20, 20, 220, 85, 10);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 18px Cairo';
ctx.textAlign = 'right';
ctx.textBaseline = 'top';
ctx.fillText(`النقاط: ${state.score}`, 225, 30);
// HP
ctx.fillStyle = 'rgba(255,255,255,0.3)';
ctx.fillRect(30, 60, 200, 18);
const hpColor = f.hp > 50 ? '#4dff80' : f.hp > 25 ? '#ffdd44' : '#ff4d4d';
ctx.fillStyle = hpColor;
ctx.fillRect(30, 60, 200 * (f.hp/f.maxHp), 18);
ctx.strokeStyle = '#fff';
ctx.lineWidth = 1;
ctx.strokeRect(30, 60, 200, 18);
ctx.fillStyle = '#fff';
ctx.font = 'bold 12px Cairo';
ctx.textAlign = 'center';
ctx.fillText(`${Math.ceil(f.hp)} / ${f.maxHp}`, 130, 63);
// Pearls
ctx.textAlign = 'right';
ctx.font = 'bold 14px Cairo';
ctx.fillStyle = '#ffd866';
ctx.fillText(`💎 ${state.pearlPoints}`, 225, 83);

// Wave HUD
ctx.fillStyle = 'rgba(0,0,0,0.5)';
roundRect(W - 220, 20, 200, 50, 10);
ctx.fill();
ctx.fillStyle = '#fff';
ctx.font = 'bold 20px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
if (this.phase === 'boss') {
ctx.fillText('معركة نهائية!', W - 120, 45);
} else {
ctx.fillText(`الموجة ${this.wave} / ${this.maxWaves}`, W - 120, 45);
}

// Tower build buttons
this.drawTowerShop();

// Instruction
ctx.fillStyle = 'rgba(255,255,255,0.85)';
ctx.font = 'bold 16px Cairo';
ctx.textAlign = 'center';
if (this.phase === 'boss') {
ctx.fillText('انقر على الدكتور دَكاي لإصابته! استخدم كل ما تعلّمته!', W/2, H - 60);
} else {
ctx.fillText('انقر لإطلاق الفلورايد! اشتر الأبراج الدفاعية بالنقاط.', W/2, H - 60);
}

if (this.placingTower) {
ctx.fillStyle = 'rgba(255,215,100,0.9)';
ctx.font = 'bold 18px Cairo';
ctx.fillText(`ضع البرج (${this.placingTower.cost} نقطة)`, W/2, H - 85);
}
},
drawTowerShop() {
const shop = [
{ type: 'toothpaste', cost: 200, range: 180, color: '#4ca0ff', icon: '💉', label: 'مدفع معجون' },
{ type: 'floss', cost: 300, range: 150, color: '#88dddd', icon: '🧵', label: 'فخ الخيط' },
{ type: 'mouthwash', cost: 400, range: 200, color: '#88ff88', icon: '💧', label: 'بحر الغسول' }
];
const bw = 110, bh = 60, gap = 10;
const startX = W - (bw*3 + gap*2) - 20;
const y = 85;
for (let i = 0; i < shop.length; i++) {
const s = shop[i];
const x = startX + i * (bw + gap);
const hover = input.x >= x && input.x <= x + bw && input.y >= y && input.y <= y + bh;
const affordable = state.score >= s.cost;
ctx.fillStyle = affordable ? (hover ? shade(s.color, 30) : s.color) : '#3a3a4a';
ctx.strokeStyle = this.placingTower && this.placingTower.type === s.type ? '#ffd866' : '#fff';
ctx.lineWidth = this.placingTower && this.placingTower.type === s.type ? 3 : 1.5;
roundRect(x, y, bw, bh, 8);
ctx.fill(); ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = '22px serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(s.icon, x + bw/2, y + 20);
ctx.font = 'bold 11px Cairo';
ctx.fillText(s.label, x + bw/2, y + 40);
ctx.fillStyle = affordable ? '#ffd866' : 'rgba(255,255,255,0.5)';
ctx.font = 'bold 11px Cairo';
ctx.fillText(`${s.cost}`, x + bw/2, y + 52);
if (hover && input.clicked && affordable) {
this.placingTower = s;
SFX.click();
}
}
},
drawTower(t) {
const icons = { toothpaste: '💉', floss: '🧵', mouthwash: '💧' };
const colors = { toothpaste: '#4ca0ff', floss: '#88dddd', mouthwash: '#88ff88' };
ctx.fillStyle = colors[t.type];
ctx.strokeStyle = '#fff';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.arc(t.x, t.y, 22, 0, Math.PI*2);
ctx.fill(); ctx.stroke();
ctx.fillStyle = '#fff';
ctx.font = '22px serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(icons[t.type], t.x, t.y);
},
drawEnemy(e) {
const sz = e.size + Math.sin(e.wobble) * 2;
ctx.fillStyle = 'rgba(0,0,0,0.3)';
ctx.beginPath();
ctx.ellipse(e.x, e.y + sz*0.8, sz*0.7, sz*0.3, 0, 0, Math.PI*2);
ctx.fill();
const eg = ctx.createRadialGradient(e.x - sz*0.3, e.y - sz*0.3, 0, e.x, e.y, sz);
eg.addColorStop(0, e.color1);
eg.addColorStop(1, e.color2);
ctx.fillStyle = eg;
ctx.beginPath();
for (let a = 0; a < Math.PI*2; a += Math.PI/8) {
const r = sz + Math.sin(a * 3 + e.wobble) * 2;
const px = e.x + Math.cos(a) * r;
const py = e.y + Math.sin(a) * r;
if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
}
ctx.closePath(); ctx.fill();
// Tentacles
ctx.strokeStyle = e.color2;
ctx.lineWidth = 2;
for (let a = 0; a < Math.PI*2; a += Math.PI/3) {
const tx = e.x + Math.cos(a + e.wobble*0.3) * (sz + 6);
const ty = e.y + Math.sin(a + e.wobble*0.3) * (sz + 6);
ctx.beginPath();
ctx.moveTo(e.x + Math.cos(a) * sz, e.y + Math.sin(a) * sz);
ctx.lineTo(tx, ty);
ctx.stroke();
}
ctx.fillStyle = '#fff';
ctx.beginPath(); ctx.arc(e.x, e.y, sz*0.4, 0, Math.PI*2); ctx.fill();
ctx.fillStyle = '#000';
ctx.beginPath(); ctx.arc(e.x, e.y, sz*0.2, 0, Math.PI*2); ctx.fill();
if (e.hp < e.maxHp) {
ctx.fillStyle = 'rgba(0,0,0,0.5)';
ctx.fillRect(e.x - 22, e.y - sz - 14, 44, 5);
ctx.fillStyle = '#4dff80';
ctx.fillRect(e.x - 22, e.y - sz - 14, 44 * (e.hp/e.maxHp), 5);
}
// Slow indicator
if (e.slowTime > 0) {
ctx.strokeStyle = 'rgba(136,221,255,0.6)';
ctx.lineWidth = 2;
ctx.setLineDash([3, 3]);
ctx.beginPath();
ctx.arc(e.x, e.y, sz + 10, 0, Math.PI*2);
ctx.stroke();
ctx.setLineDash([]);
}
},
drawRiddle() {
// Dim
ctx.fillStyle = 'rgba(0,0,0,0.7)';
ctx.fillRect(0, 0, W, H);

// Panel
const panelW = 640, panelH = 420;
const px = (W - panelW)/2, py = (H - panelH)/2;
const grad = ctx.createLinearGradient(px, py, px, py + panelH);
grad.addColorStop(0, '#3a5080');
grad.addColorStop(1, '#1a2858');
ctx.fillStyle = grad;
ctx.strokeStyle = '#ffd866';
ctx.lineWidth = 4;
roundRect(px, py, panelW, panelH, 20);
ctx.fill(); ctx.stroke();

ctx.fillStyle = '#ffd866';
ctx.font = 'bold 32px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('💡 لغز الفلورايد', W/2, py + 60);

// Question
ctx.fillStyle = '#fff';
ctx.font = 'bold 24px Cairo';
const words = this.currentRiddle.q.split(' ');
const lines = [];
let line = '';
for (const w of words) {
if (line.length + w.length > 35) { lines.push(line); line = w; }
else line += (line ? ' ' : '') + w;
}
if (line) lines.push(line);
for (let i = 0; i < lines.length; i++) {
ctx.fillText(lines[i], W/2, py + 130 + i * 32);
}

// Options
const bw = 170, bh = 60, gap = 20;
const startX = W/2 - (bw * 3 + gap * 2) / 2;
for (let i = 0; i < this.currentRiddle.options.length; i++) {
const opt = this.currentRiddle.options[i];
const x = startX + i * (bw + gap);
const y = py + 280;
const c1 = opt.correct ? '#5cd88a' : '#4da6d9';
const c2 = opt.correct ? '#2db066' : '#2d7ab0';
// We don't reveal correctness in colors — same blue
if (drawButton(x, y, bw, bh, opt.text, '#4da6d9', '#2d7ab0', 'bold 20px Cairo')) {
if (this.riddleAnswered) return;
this.riddleAnswered = true;
if (opt.correct) {
state.score += 500;
state.pearlPoints += 5;
save();
addFloat(W/2, py + 180, '+500 نقاط! +5 💎', '#ffdd66', 32);
SFX.victory();
setTimeout(() => this.advanceWave(), 1200);
} else {
addFloat(W/2, py + 180, 'خطأ! الإجابة: ' + this.currentRiddle.options.find(o => o.correct).text, '#ff6b8a', 24);
SFX.lose();
setTimeout(() => this.advanceWave(), 2000);
}
}
}

ctx.fillStyle = 'rgba(255,255,255,0.7)';
ctx.font = '16px Cairo';
ctx.fillText('أجب عن اللغز للانتقال إلى الموجة التالية', W/2, py + panelH - 30);
},
advanceWave() {
this.wave++;
this.enemiesSpawned = 0;
this.waveTotal = 8 + this.wave * 3;
this.spawnTimer = 2;
this.phase = 'wave';
this.currentRiddle = null;
}
};

// =========================================================================
// RESULT SCENE
// =========================================================================
const resultScene = {
stars: 0, score: 0, levelName: '', showTime: 0, starsShown: [false, false, false],
init(stars, score, levelName) {
this.stars = stars; this.score = score; this.levelName = levelName;
this.showTime = 0;
this.starsShown = [false, false, false];
},
update(dt) {
this.showTime += dt;
for (let i = 0; i < 3; i++) {
if (!this.starsShown[i] && this.showTime > 0.5 + i * 0.4 && i < this.stars) {
this.starsShown[i] = true;
SFX.star();
}
}
},
draw() {
drawBackground('night');
ctx.fillStyle = 'rgba(0,0,0,0.5)';
ctx.fillRect(0, 0, W, H);

const panelW = 540, panelH = 440;
const px = (W - panelW) / 2, py = (H - panelH) / 2;
const grad = ctx.createLinearGradient(px, py, px, py + panelH);
grad.addColorStop(0, '#3a5080');
grad.addColorStop(1, '#0f2a55');
ctx.fillStyle = grad;
ctx.strokeStyle = '#88ccff';
ctx.lineWidth = 3;
roundRect(px, py, panelW, panelH, 20);
ctx.fill(); ctx.stroke();

ctx.fillStyle = '#fff';
ctx.font = 'bold 36px Cairo';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText(this.stars > 0 ? '🎉 أحسنت!' : 'حاول مجدداً', W/2, py + 55);

ctx.font = '22px Cairo';
ctx.fillStyle = 'rgba(255,255,255,0.85)';
ctx.fillText(this.levelName, W/2, py + 95);

// Stars
for (let i = 0; i < 3; i++) {
const sx = W/2 - 85 + i * 85;
const sy = py + 190;
const visible = this.starsShown[i];
const scale = visible ? 1 + Math.max(0, Math.sin((this.showTime - 0.5 - i * 0.4) * 8) * 0.3) : 0;
ctx.save();
ctx.translate(sx, sy);
ctx.scale(scale, scale);
drawStar(0, 0, 38, true);
ctx.restore();
if (!visible) drawStar(sx, sy, 38, false);
}

ctx.fillStyle = '#ffd866';
ctx.font = 'bold 28px Cairo';
ctx.fillText(`النقاط: ${this.score}`, W/2, py + 270);
ctx.font = 'bold 20px Cairo';
ctx.fillStyle = '#b48cff';
ctx.fillText(`المجموع الكلي: ${state.totalScore}`, W/2, py + 305);

// Certificate notice
if (state.unlockedCertificate && this.levelName === 'قلعة الفلورايد' && this.stars >= 1) {
ctx.fillStyle = '#ffd866';
ctx.font = 'bold 18px Cairo';
ctx.fillText('🏆 حصلت على الشهادة الذهبية!', W/2, py + 340);
}

if (drawButton(px + 40, py + panelH - 70, 200, 50, '↻ إعادة', '#5cd88a', '#2db066')) {
SFX.click();
const levelKey = 'level' + state.level;
scenes[levelKey].init();
state.scene = levelKey;
}
if (drawButton(px + panelW - 240, py + panelH - 70, 200, 50, 'القائمة', '#4da6d9', '#2d7ab0')) {
SFX.click();
state.scene = 'menu';
}
}
};

// =========================================================================
// CERTIFICATE SCENE
// =========================================================================
const certificateScene = {
init() {},
update(dt) {},
draw() {
drawBackground('night');

// Parchment
const px = 80, py = 60, pw = W - 160, ph = H - 150;
const grad = ctx.createLinearGradient(px, py, px, py + ph);
grad.addColorStop(0, '#fff5d8');
grad.addColorStop(1, '#e8d4a0');
ctx.fillStyle = grad;
ctx.strokeStyle = '#b8902a';
ctx.lineWidth = 6;
roundRect(px, py, pw, ph, 16);
ctx.fill(); ctx.stroke();
// Inner frame
ctx.strokeStyle = '#b8902a';
ctx.lineWidth = 2;
roundRect(px + 20, py + 20, pw - 40, ph - 40, 8);
ctx.stroke();

// Decorative corners
ctx.fillStyle = '#b8902a';
[[px + 30, py + 30], [px + pw - 30, py + 30], [px + 30, py + ph - 30], [px + pw - 30, py + ph - 30]].forEach(([x, y]) => {
drawStar(x, y, 12, true, false);
});

// Title
ctx.fillStyle = '#5a3a0a';
ctx.font = 'bold 48px Lalezar, Cairo, sans-serif';
ctx.textAlign = 'center';
ctx.textBaseline = 'middle';
ctx.fillText('🏆 الشهادة الذهبية 🏆', W/2, py + 80);

// Lammaa
drawLammaa(W/2, py + 200, 55, 'excited', state.t * 0.003);

// Body
ctx.fillStyle = '#3a2a0a';
ctx.font = 'bold 28px Cairo';
ctx.fillText('تُمنح هذه الشهادة إلى', W/2, py + 300);
ctx.font = 'bold 36px Cairo';
ctx.fillStyle = '#8a5a1a';
ctx.fillText('حارس الابتسامة البطل', W/2, py + 345);

ctx.font = '22px Cairo';
ctx.fillStyle = '#3a2a0a';
ctx.fillText('لانتصاره على الدكتور دَكاي', W/2, py + 395);
ctx.fillText('وإتقانه العناية بالأسنان', W/2, py + 425);

ctx.fillStyle = '#6a4a1a';
ctx.font = 'italic 18px Amiri, serif';
ctx.fillText('« بريق! بريق! ابتسامة تسرّ الناظرين! »', W/2, py + 475);

// Signature
ctx.fillStyle = '#5a3a0a';
ctx.font = 'bold 16px Cairo';
ctx.fillText('د. عبدالله آل زيد', W/2, py + ph - 40);

if (drawButton(W/2 - 100, H - 70, 200, 50, '← رجوع', '#5a6b8c', '#3a4b6c')) {
SFX.click();
state.scene = 'title';
}
}
};

// =========================================================================
// SCENES
// =========================================================================
const scenes = {
title: titleScene,
menu: menuScene,
shop: shopScene,
level1: level1,
level2: level2,
level3: level3,
result: resultScene,
certificate: certificateScene
};

// =========================================================================
// MAIN LOOP
// =========================================================================
let lastTime = performance.now();
function loop(now) {
const dt = Math.min(0.05, (now - lastTime) / 1000);
lastTime = now;
state.t++;

ctx.clearRect(0, 0, W, H);

const scene = scenes[state.scene];
if (scene) { scene.update(dt); scene.draw(); }

updateParticles(dt);

input.clicked = false;
input.justPressed = false;

requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
